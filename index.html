<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Snake Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:100dvh;padding:20px 0 100px;padding-bottom:max(100px,calc(env(safe-area-inset-bottom,80px) + 40px));font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;overflow-y:auto;overflow-x:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
.game-wrapper{display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;min-height:100vh;min-height:100dvh;justify-content:center}
.header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:420px;color:#ccc;padding:0 4px}
.scores{display:flex;flex-direction:column;gap:2px}
.score{font-size:20px;font-weight:bold;color:#eee}
.high{font-size:12px;color:#999}
.coins{font-size:12px;color:#ffd740;margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.boost-badge{font-size:15px;color:#ffd740;font-weight:bold;display:none}
.boost-badge.active{display:block}
canvas{border:2px solid #333;border-radius:6px;display:block;background:#16162a}
.dpad{display:none;width:180px;height:180px;position:relative;margin-top:8px;margin-bottom:24px}
.dpad button{position:absolute;width:56px;height:56px;border:none;border-radius:28px;background:rgba(255,255,255,.12);color:#ccc;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.dpad button:active{background:rgba(255,255,255,.28)}
.dpad .btn-up{top:0;left:62px}
.dpad .btn-down{bottom:0;left:62px}
.dpad .btn-left{top:62px;left:0}
.dpad .btn-right{top:62px;right:0}
.footer{display:flex;gap:12px;align-items:center;color:#666;font-size:12px}
.footer button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#ccc;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit}
.footer button:active{background:rgba(255,255,255,.18)}
.home-overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:#87ceeb}
.home-overlay.hidden{display:none}
.home-bg-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.home-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px}
.home-title{font-size:76px;font-weight:900;letter-spacing:8px;margin-bottom:4px;animation:titleFloat 3s ease-in-out infinite}
.home-title span{display:inline-block;filter:drop-shadow(3px 4px 0px rgba(0,0,0,.25))}
.home-title .c1{color:#ff5722;animation:charBounce .45s ease-in-out infinite}
.home-title .c2{color:#f9a825;animation:charBounce .45s ease-in-out .1s infinite}
.home-title .c3{color:#4caf50;animation:charBounce .45s ease-in-out .2s infinite}
@keyframes charBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.home-subtitle{font-size:15px;color:#5d7a5d;margin-bottom:14px;text-align:center;line-height:1.5;font-weight:500}
.home-enter-btn{background:#ff6e6e;color:#fff;border:3px solid #d94444;padding:14px 50px;border-radius:50px;font-size:21px;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 6px 0 #d94444,0 8px 24px rgba(0,0,0,.15);animation:btnBounce 2.5s ease-in-out infinite;letter-spacing:2px;transition:all .1s}
.home-enter-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #d94444,0 4px 12px rgba(0,0,0,.15)}
@keyframes btnBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.home-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.home-extra-btn{background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.3);padding:10px 22px;border-radius:28px;font-size:15px;cursor:pointer;font-family:inherit;transition:all .15s}
.home-extra-btn:active{background:rgba(255,255,255,.35)}
.diff-overlay{position:fixed;inset:0;z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(180deg,#7ec8f8 0%,#b8dff8 50%,#c8e8d0 65%,#8bc78b 100%)}
.diff-overlay.hidden{display:none}
.diff-card{position:relative;z-index:2;background:rgba(255,255,255,.92);border-radius:24px;padding:28px 22px 24px;max-width:380px;width:90%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.diff-card h2{font-size:24px;color:#555;margin-bottom:6px}
.diff-card .sub{font-size:13px;color:#aaa;margin-bottom:16px}
.diff-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.diff-btn{border:2.5px solid #e0e0e0;border-radius:16px;padding:14px 16px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s;display:flex;align-items:center;gap:12px;position:relative}
.diff-btn:active{transform:scale(.97)}
.diff-btn.easy{border-color:#66bb6a;background:#e8f5e9}
.diff-btn.easy:active{border-color:#43a047;background:#c8e6c9}
.diff-btn.medium{border-color:#ffa726;background:#fff3e0}
.diff-btn.medium:active{border-color:#ef6c00;background:#ffe0b2}
.diff-btn.hard{border-color:#ef5350;background:#ffebee}
.diff-btn.hard:active{border-color:#d32f2f;background:#ffcdd2}
.diff-btn.locked{opacity:.55}
.diff-btn .icon{font-size:36px;flex-shrink:0}
.diff-btn .info h3{font-size:17px;color:#444;margin-bottom:2px}
.diff-btn .info p{font-size:12px;color:#888}
.diff-back{background:none;border:none;color:#999;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px}
.lock-badge{position:absolute;inset:-2px;pointer-events:none;overflow:hidden;border-radius:16px;z-index:2}
.lock-badge .chain{position:absolute;width:100%;height:100%}
.chain-line{position:absolute;height:6px;background:repeating-linear-gradient(90deg,#8d7b6a 0px,#8d7b6a 6px,#c4a882 6px,#c4a882 10px,#8d7b6a 10px,#8d7b6a 16px);border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.3);transform-origin:center center}
.chain-line.cl1{top:50%;left:-10%;width:130%;transform:translateY(-50%) rotate(35deg)}
.chain-line.cl2{top:50%;left:-10%;width:130%;transform:translateY(-50%) rotate(-35deg)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:20px;padding:24px 20px 20px;max-width:400px;width:100%;color:#444;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,.18);position:relative;max-height:90vh;overflow-y:auto}
.modal h2{font-size:22px;margin-bottom:6px;color:#555}
.modal .rules{font-size:13px;color:#999;margin-bottom:10px;line-height:1.7}
.modal .countdown{font-size:12px;color:#bbb;margin-bottom:12px}
.modal .countdown span{color:#ff7b7b;font-weight:bold;font-size:16px}
.modal .close-btn{position:absolute;top:12px;right:16px;background:none;border:none;color:#bbb;font-size:22px;cursor:pointer;line-height:1}
.skin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.skin-item{aspect-ratio:1;border-radius:14px;cursor:pointer;border:2.5px solid #eee;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:11px;color:#777;background:#fafafa;transition:all .2s;position:relative;min-height:64px}
@supports not (aspect-ratio:1){.skin-item{height:0;padding-bottom:100%}}
.skin-item:active{transform:scale(.95);background:#f0f0f0}
.skin-item.selected{border-color:#64dc64;background:#f0fdf0}
.skin-item.locked{opacity:.45}
.skin-item .swatch{width:32px;height:32px;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.skin-item .price{font-size:10px;color:#e8953a}
.modal .start-btn{background:#ff7b7b;border:none;color:#fff;padding:12px 44px;border-radius:28px;font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(255,123,123,.3);transition:transform .15s}
.modal .start-btn:active{transform:scale(.94)}
.confirm-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.hidden{display:none}
.confirm-card{background:#fff;border-radius:20px;padding:28px 24px 22px;max-width:340px;width:90%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.confirm-card h3{font-size:18px;color:#555;margin-bottom:8px}
.confirm-card p{font-size:14px;color:#999;margin-bottom:18px;line-height:1.5}
.confirm-btns{display:flex;gap:12px;justify-content:center}
.confirm-btns button{padding:10px 24px;border-radius:22px;font-size:15px;font-weight:bold;cursor:pointer;font-family:inherit;border:none;transition:transform .1s}
.confirm-btns button:active{transform:scale(.94)}
.confirm-btns .btn-confirm{background:#ff6e6e;color:#fff}
.confirm-btns .btn-cancel{background:#f0f0f0;color:#666}

/* Toast 成就提示 */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:500;background:rgba(0,0,0,.85);color:#ffd740;padding:10px 24px;border-radius:24px;font-size:14px;font-weight:bold;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.toast.fade{opacity:0}

/* 道具提示条 */
.powerup-bar{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:8px}
.powerup-bar .pw-indicator{background:rgba(0,0,0,.7);color:#ffd740;padding:4px 12px;border-radius:12px;font-size:12px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* AI 分数面板 */
.ai-panel{position:absolute;top:50px;right:0;background:rgba(0,0,0,.5);color:#0ff;padding:4px 10px;border-radius:8px;font-size:12px;z-index:10}
.stamina-bar{width:120px;height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden;margin-top:2px}
.stamina-bar-fill{height:100%;border-radius:4px;transition:width .2s}
.stamina-bar-fill.player{background:#ffd740}
.stamina-bar-fill.ai{background:#0ff}

@media (pointer:coarse){.dpad{display:block}.footer{display:none}}
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <div class="scores"><span class="score" id="score">Score: 0</span><span class="high" id="high">Best: 0</span><span class="coins" id="coins">Coins 0</span></div>
    <div class="header-right"><span class="boost-badge" id="boostBadge">BOOST</span><div class="stamina-bar" id="staminaWrap"><div class="stamina-bar-fill player" id="staminaFill"></div></div><span class="ai-panel hidden" id="aiPanel">AI: 0<div class="stamina-bar"><div class="stamina-bar-fill ai" id="aiStaminaFill"></div></div></span></div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="dpad" id="dpad">
    <button class="btn-up" id="btnUp">▲</button><button class="btn-down" id="btnDown">▼</button>
    <button class="btn-left" id="btnLeft">◀</button><button class="btn-right" id="btnRight">▶</button>
  </div>
  <div class="powerup-bar" id="powerupBar"></div>
  <div class="footer">
    <span id="footerHint">Arrows/WASD move</span>
    <button id="btnBoost">Boost</button><button id="btnPause">Pause</button>
    <button id="btnRestart">Restart</button><button id="footerShopBtn">Shop</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Home -->
<div class="home-overlay" id="homeOverlay">
  <canvas class="home-bg-canvas" id="homeBgCanvas"></canvas>
  <div class="home-content">
    <div class="home-title"><span class="c1" id="titleC1">贪</span><span class="c2" id="titleC2">吃</span><span class="c3" id="titleC3">蛇</span></div>
    <div class="home-subtitle" id="homeSubtitle">阳光明媚，春暖花开<br>和小蛇一起快乐冒险吧</div>
    <div class="home-btns">
      <button class="home-enter-btn" id="homeEnterBtn">进入游戏</button>
      <button class="home-extra-btn" id="homeAiBtn">AI 对战</button>
      <button class="home-extra-btn" id="homeLangBtn">EN</button>
      <button class="home-extra-btn" id="homeReplayBtn" style="display:none;">回放</button>
    </div>
  </div>
</div>

<!-- Difficulty -->
<div class="diff-overlay hidden" id="diffOverlay">
  <div class="diff-card" style="position:relative;">
    <h2 id="diffTitle">选择难度</h2>
    <p class="sub" id="diffSub">选择适合你的挑战级别</p>
    <div class="diff-btns">
      <button class="diff-btn easy" id="diffEasy"><span class="icon" style="color:#66bb6a;">●</span><span class="info"><h3 id="diffEasyName">简单模式</h3><p id="diffEasyDesc">悠闲节奏，轻松玩耍</p></span></button>
      <button class="diff-btn medium" id="diffMedium"><span class="icon" style="color:#ffa726;">●</span><span class="info"><h3 id="diffMedName">中等模式</h3><p id="diffMedDesc">正常速度，经典体验</p></span><span class="lock-badge" id="lockMedium" style="display:none;"><span class="chain"><span class="chain-line cl1"></span><span class="chain-line cl2"></span></span></span></button>
      <button class="diff-btn hard" id="diffHard"><span class="icon" style="color:#ef5350;">●</span><span class="info"><h3 id="diffHardName">困难模式</h3><p id="diffHardDesc">场地中出现障碍物，碰到即死</p></span><span class="lock-badge" id="lockHard" style="display:none;"><span class="chain"><span class="chain-line cl1"></span><span class="chain-line cl2"></span></span></span></button>
      <button class="diff-btn boss" id="diffBoss" style="border-color:#d500f9;background:#fce4ff;"><span class="icon" style="color:#d500f9;">◆</span><span class="info"><h3 id="diffBossName">Boss 模式</h3><p id="diffBossDesc">巨型 Boss 追踪玩家，碰到即死</p></span><span class="lock-badge" id="lockBoss" style="display:none;"><span class="chain"><span class="chain-line cl1"></span><span class="chain-line cl2"></span></span></span></button>
    </div>
    <button class="diff-back" id="diffBack" style="display:block;margin:0 auto;">← 返回首页</button>
    <button id="devBtn" style="background:none;border:none;color:#ccc;font-size:12px;cursor:pointer;margin-top:4px;">开发者模式</button>
    <div id="lockTip" style="display:none;position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:#fff;border-radius:12px;padding:12px 32px 12px 16px;box-shadow:0 4px 20px rgba(0,0,0,.18);font-size:13px;color:#666;white-space:nowrap;z-index:5;"><span id="lockTipMsg"></span><button id="lockTipClose" style="position:absolute;top:6px;right:8px;background:none;border:none;font-size:14px;color:#aaa;cursor:pointer;">✕</button></div>
  </div>
</div>

<!-- Skin -->
<div class="overlay hidden" id="skinOverlay">
  <div class="modal"><button class="close-btn" id="skinClose">✕</button><h2 id="skinTitle">选择皮肤</h2><p class="rules" id="skinRules">选择你喜欢的颜色，也可以在商店购买更多</p><p class="countdown"><span id="countdownNum">5</span> 秒后自动开始</p><div class="skin-grid" id="splashSkinGrid"></div><button class="start-btn" id="skinStart">开始游戏</button></div>
</div>

<!-- Shop -->
<div class="overlay hidden" id="shopOverlay">
  <div class="modal shop-modal"><button class="close-btn" id="shopClose">✕</button><h2 id="shopTitle">皮肤商店</h2><p style="font-size:13px;color:#ffd740;margin:6px 0;">Coins <span id="shopCoins">0</span></p><div class="skin-grid" id="shopSkinGrid"></div><p id="shopMsg" style="font-size:12px;color:#888;min-height:18px;margin:4px 0;"></p><button class="shop-close-btn" id="shopCloseBtn" style="background:#f0f0f0;border:none;color:#666;padding:8px 28px;border-radius:18px;font-size:14px;cursor:pointer;font-family:inherit;">关闭商店</button></div>
</div>

<!-- Confirm -->
<div class="confirm-overlay hidden" id="confirmOverlay">
  <div class="confirm-card"><h3 id="confirmTitle">重来</h3><p id="confirmMsg">重来会退出本局游戏<br>清空当前进度</p><div class="confirm-btns"><button class="btn-cancel" id="confirmCancel">返回游戏</button><button class="btn-confirm" id="confirmOk">确认退出</button></div></div>
</div>

<!-- Global mute -->
<button id="muteBtn" style="position:fixed;top:max(14px,env(safe-area-inset-top));right:max(14px,env(safe-area-inset-right));z-index:500;background:rgba(0,0,0,.25);border:none;color:#fff;border-radius:24px;padding:7px 14px;font-size:15px;font-weight:bold;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:1px;">♪ Music</button>

// ==================== AI BFS ====================
function aiFindPath(snakeBody,foodPos,obsCells){
  const head=snakeBody[0];
  const occupied=new Set(snakeBody.map(([x,y])=>`${x},${y}`));
  obsCells.forEach(c=>occupied.add(`${c.x},${c.y}`));
  const queue=[[head[0],head[1]]],prev={},visited=new Set([`${head[0]},${head[1]}`]);
  while(queue.length){
    const [cx,cy]=queue.shift();
    if(cx===foodPos[0]&&cy===foodPos[1]){
      // 回溯路径：每一步存 [x,y]
      const path=[];let cur=`${cx},${cy}`;
      while(cur!==`${head[0]},${head[1]}`){
        const p=cur.split(',').map(Number);path.unshift(p);cur=prev[cur];
      }
      return path;
    }
    for(const[dx,dy]of[[0,-1],[0,1],[-1,0],[1,0]]){
      let nx=cx+dx,ny=cy+dy;
      nx=(nx+COLS)%COLS;ny=(ny+ROWS)%ROWS;
      const k=`${nx},${ny}`;
      if(!occupied.has(k)&&!visited.has(k)){
        visited.add(k);prev[k]=`${cx},${cy}`;queue.push([nx,ny]);
      }
    }
  }
  return null;
}

function updateAI(){
  if(!aiMode||!aiSnake||!aiAlive||gameOver||paused)return;
  const head=aiSnake[0];
  const obsCells=[];obstacles.forEach(o=>{if(o.state==='solid')o.cells.forEach(c=>obsCells.push(c))});
  const path=aiFindPath(aiSnake,food,obsCells);
  // AI 离食物远且有体力时冲刺
  const distToFood=path?path.length:999;
  aiBoosting=(distToFood>6&&aiStamina>20);
  // AI 隔帧移动，模拟反应延迟
  if(aiBoosting){if(Math.random()<.2)return}else{if(Math.random()<.4)return}
  if(path&&path.length>=1){
    const [tx,ty]=path[0];
    let dx=tx-head[0],dy=ty-head[1];
    if(Math.abs(dx)>1)dx=dx>0?-1:1;
    if(Math.abs(dy)>1)dy=dy>0?-1:1;
    if(dx!==0||dy!==0)aiDir=[dx,dy];
  }
  let nx=head[0]+aiDir[0],ny=head[1]+aiDir[1];
  nx=(nx+COLS)%COLS;ny=(ny+ROWS)%ROWS;
  if(aiSnake.some(([x,y])=>x===nx&&y===ny)){aiAlive=false;return}
  if(obstacles.some(o=>o.state==='solid'&&o.cells.some(c=>c.x===nx&&c.y===ny))){aiAlive=false;return}
  aiSnake.unshift([nx,ny]);
  if(nx===food[0]&&ny===food[1]){aiScore+=10;spawnFood()}else{aiSnake.pop()}
  updateAIPanel();
}

// ==================== Boss 更新 ====================
let bossPhase=1,bossPhaseTimer=0,bossBurstSteps=0;
function getBossPhase(){
  if(score<40)return 1;  // 巡逻期
  if(score<80)return 2;  // 追踪期
  if(score<130)return 3; // 狂暴期
  return 4;              // 地狱期
}
function updateBoss(){
  if(!boss||difficulty!=='boss')return;
  const phase=getBossPhase();
  bossPhaseTimer++;
  // 各阶段速度不同
  const speedMap={1:25,2:18,3:10,4:6};
  const speed=speedMap[phase]||20;
  if(bossPhaseTimer<speed)return;
  bossPhaseTimer=0;
  if(phase!==bossPhase){bossPhase=phase;showToast(`Boss 进入第 ${phase} 阶段！`)}
  const head=snake[0];
  const bx=boss.x+Math.floor(boss.w/2),by=boss.y+Math.floor(boss.h/2);
  let dx=0,dy=0;
  if(phase===1){
    // 巡逻：随机漫步，偶尔向蛇靠近
    if(Math.random()<.3){if(head[0]>bx)dx=1;else if(head[0]<bx)dx=-1}
    else if(Math.random()<.3){if(head[1]>by)dy=1;else if(head[1]<by)dy=-1}
    else{dx=[-1,0,1][Math.floor(Math.random()*3)];dy=[-1,0,1][Math.floor(Math.random()*3)]}
  }else if(phase===2){
    // 追踪：主动追蛇
    if(head[0]>bx)dx=1;else if(head[0]<bx)dx=-1;
    if(head[1]>by)dy=1;else if(head[1]<by)dy=-1;
    if(Math.random()<.25){dx=[-1,0,1][Math.floor(Math.random()*3)];dy=[-1,0,1][Math.floor(Math.random()*3)]}
  }else if(phase===3){
    // 狂暴：快速追踪 + 连续冲刺
    if(head[0]>bx)dx=1;else if(head[0]<bx)dx=-1;
    if(head[1]>by)dy=1;else if(head[1]<by)dy=-1;
    bossBurstSteps++;
    if(bossBurstSteps>3&&bossBurstSteps<5){dx*=2;dy*=2} // 冲刺
    if(bossBurstSteps>=5)bossBurstSteps=0;
  }else{
    // 地狱：高速 + 预判蛇的移动方向
    if(direction[0]===1)dx=1;else if(direction[0]===-1)dx=-1;
    if(direction[1]===1)dy=1;else if(direction[1]===-1)dy=-1;
    // 偶尔也向蛇头靠近
    if(Math.random()<.4){if(head[0]>bx)dx=1;else if(head[0]<bx)dx=-1}
    if(Math.random()<.4){if(head[1]>by)dy=1;else if(head[1]<by)dy=-1}
  }
  // 执行移动
  boss.x=Math.max(0,Math.min(COLS-boss.w,boss.x+dx));
  boss.y=Math.max(0,Math.min(ROWS-boss.h,boss.y+dy));
}
function checkBossCollision(nx,ny){
  if(!boss||difficulty!=='boss')return false;
  return nx>=boss.x&&nx<boss.x+boss.w&&ny>=boss.y&&ny<boss.y+boss.h;
}

  powerups.splice(idx,1);updatePowerupBar();sfxEat();

// ==================== Update ====================
function update(){
  if(gameOver||paused||isReplaying)return;

  if(!isReplaying){
    replayFrames.push({dir:[...direction],score,beans:gameBeans,ate:false,dead:false});
  }

  direction=[...nextDirection];
  const head=snake[0];
  let nx=head[0]+direction[0],ny=head[1]+direction[1];
  nx=(nx+COLS)%COLS;ny=(ny+ROWS)%ROWS;

  // 碰撞
  if(snake.some(([x,y])=>x===nx&&y===ny)){endGame();return}
  if(!activePowerups.shield||activePowerups.shield<=0){
    // Boss 碰撞
    if(checkBossCollision(nx,ny)){endGame();return}
    // 障碍物碰撞
    for(const obs of obstacles){if(obs.state!=='solid')continue;if(obs.cells.some(c=>c.x===nx&&c.y===ny)){endGame();return}}
  }
  snake.unshift([nx,ny]);
  // 道具
  let ate=false;
  for(let i=powerups.length-1;i>=0;i--){if(powerups[i].x===nx&&powerups[i].y===ny){collectPowerup(i);ate=true;break}}
  if(nx===food[0]&&ny===food[1]){
    score+=10;gameBeans++;if(score>highScore)highScore=score;sfxEat();spawnFood();
    // 磁铁效果
    if(activePowerups.magnet&&activePowerups.magnet>0){
      const h=snake[0];let minD=Infinity,closest=null;
      for(let dx=-4;dx<=4;dx++)for(let dy=-4;dy<=4;dy++){
        if(Math.abs(dx)+Math.abs(dy)>4)continue;
        if(h[0]+dx===food[0]&&h[1]+dy===food[1]){/* 食物已在范围内，已被吃 */break}
      }
    }
    ate=true;
  }else{snake.pop()}
  if(ate)replayFrames[replayFrames.length-1].ate=true;

  // 碰撞检测蛇身
  if(!activePowerups.shield||activePowerups.shield<=0){
    // Boss 身碰
    if(boss&&snake.some(([sx,sy])=>sx>=boss.x&&sx<boss.x+boss.w&&sy>=boss.y&&sy<boss.y+boss.h)){endGame();return}
    for(const obs of obstacles){if(obs.state!=='solid')continue;if(snake.some(([sx,sy])=>obs.cells.some(c=>c.x===sx&&c.y===sy))){endGame();return}}
  }
  updateUI();if(gameOver)return;
  updateStamina();

  // 道具倒计时
  Object.keys(activePowerups).forEach(k=>{if(activePowerups[k]>0)activePowerups[k]--;if(activePowerups[k]<=0)delete activePowerups[k]});
  updatePowerupBar();

  // 道具生成
  if(Math.random()<0.004)spawnPowerup();
  powerups=powerups.filter(p=>{p.life--;return p.life>0});

  // 障碍物
  if(difficulty==='hard'){
    obstacleTimer++;
    if(obstacleTimer%28===0&&obstacles.length<4&&snake.length>2){
      const crowd=new Set(snake.map(([x,y])=>`${x},${y}`));
      if(aiSnake&&aiAlive)aiSnake.forEach(([x,y])=>crowd.add(`${x},${y}`));
      crowd.add(`${food[0]},${food[1]}`);
      const chainLen=1+Math.floor(Math.random()*5);
      for(let t=0;t<50;t++){
        const sx=Math.floor(Math.random()*12)+4,sy=Math.floor(Math.random()*12)+4;
        const dirs=[[1,0],[-1,0],[0,1],[0,-1]];const dir=dirs[Math.floor(Math.random()*4)];
        const cells=[];let cx=sx,cy=sy,valid=true;
        for(let i=0;i<chainLen;i++){
          if(cx<0||cx>=COLS||cy<0||cy>=ROWS){valid=false;break}
          if(crowd.has(`${cx},${cy}`)){valid=false;break}
          if(obstacles.some(o=>o.cells.some(c=>c.x===cx&&c.y===cy))){valid=false;break}
          cells.push({x:cx,y:cy});crowd.add(`${cx},${cy}`);cx+=dir[0];cy+=dir[1];
        }
        if(valid&&cells.length>=1){obstacles.push({cells,state:'spawning',timer:OBS_SPAWN_TIME});break}
      }
    }
    obstacles=obstacles.filter(o=>{o.timer--;
      if(o.state==='spawning'&&o.timer<=0){o.state='solid';o.timer=60+Math.floor(Math.random()*40)}
      else if(o.state==='solid'&&o.timer<=0){o.state='despawning';o.timer=OBS_DESPAWN_TIME}
      else if(o.state==='despawning'&&o.timer<=0)return false;return true});
  }

  // AI + Boss
  updateAI();
  updateBoss();
}

function endGame(){
  gameOver=true;sfxDeath();
  if(score>highScore){highScore=score;localStorage.setItem('snake_high',highScore)}
  const earned=Math.floor(score/10);if(earned>0){saveData.coins=(saveData.coins||0)+earned;persistSave()}
  gameBeans=Math.floor(score/10);recordBeans(difficulty,gameBeans);checkAchievements();
  updateCoinDisplay();updateUI();updatePowerupBar();updateAIPanel();
  if(!isReplaying)saveReplay();
  if(replayFrames.length>0){replayFrames[replayFrames.length-1].dead=true}
}

// ==================== Draw ====================
let frame=0;
function drawSnakeSeg(px,py,s,i,skin){
  const r=6;ctx.beginPath();ctx.moveTo(px+r,py);ctx.lineTo(px+s-r,py);ctx.quadraticCurveTo(px+s,py,px+s,py+r);ctx.lineTo(px+s,py+s-r);ctx.quadraticCurveTo(px+s,py+s,px+s-r,py+s);ctx.lineTo(px+r,py+s);ctx.quadraticCurveTo(px,py+s,px,py+s-r);ctx.lineTo(px,py+r);ctx.quadraticCurveTo(px,py,px+r,py);ctx.closePath();
  if(skin&&skin.premium){const hue=(i*22+frame*5)%360;ctx.fillStyle=`hsl(${hue},80%,${i===0?55:40}%)`}
  else ctx.fillStyle=i===0?(skin?skin.head:'#64dc64'):(skin?skin.body:'#3cb43c');
  ctx.fill();
  if(i===0){const cx=px+s/2,cy=py+s/2;let e1,e2;if(direction[0]===1){e1=[cx+4,cy-6];e2=[cx+4,cy+6]}else if(direction[0]===-1){e1=[cx-4,cy-6];e2=[cx-4,cy+6]}else if(direction[1]===-1){e1=[cx-6,cy-4];e2=[cx+6,cy-4]}else{e1=[cx-6,cy+4];e2=[cx+6,cy+4]}for(const[ex,ey]of[e1,e2]){ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.beginPath();ctx.arc(ex,ey,2,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill()}}
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#202040';ctx.lineWidth=.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke()}
  const pulse=1+.15*Math.abs((frame%40)-20)/20,fx=food[0]*CELL+CELL/2,fy=food[1]*CELL+CELL/2,fr=(CELL/2-4)*pulse;
  ctx.beginPath();ctx.arc(fx,fy,fr,0,Math.PI*2);ctx.fillStyle='#ff5050';ctx.fill();
  ctx.beginPath();ctx.arc(fx-3,fy-3,fr/3,0,Math.PI*2);ctx.fillStyle='#ffb4b4';ctx.fill();

  // 道具
  powerups.forEach(p=>{
    const px=p.x*CELL+CELL/2,py=p.y*CELL+CELL/2,pr=CELL/2-4;
    ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);ctx.fillStyle=p.type.color;ctx.fill();
    ctx.fillStyle='#fff';ctx.font=`bold ${CELL*0.55}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.type.icon,px,py);ctx.textAlign='start';
  });

  // 障碍物
  obstacles.forEach(o=>{
    const isSp=o.state==='spawning',isDs=o.state==='despawning',isSo=o.state==='solid';
    let a,ba;
    if(isSp){const p=1-(o.timer/OBS_SPAWN_TIME);a=.15+p*.25;ba=p*.5}
    else if(isDs){const p=o.timer/OBS_DESPAWN_TIME;a=.15+p*.25;ba=p*.5}
    else{a=.7;ba=1}
    o.cells.forEach(c=>{
      const ox=c.x*CELL+2,oy=c.y*CELL+2,os=CELL-4;
      ctx.fillStyle=`rgba(100,80,60,${a})`;ctx.fillRect(ox,oy,os,os);
      ctx.fillStyle=`rgba(160,60,40,${a})`;ctx.beginPath();ctx.moveTo(ox+os/2,oy);ctx.lineTo(ox+os,oy+os/2);ctx.lineTo(ox+os/2,oy+os);ctx.lineTo(ox,oy+os/2);ctx.closePath();ctx.fill();
      if(isSo){ctx.strokeStyle=`rgba(255,80,50,${.5+.5*Math.sin(frame*.2)})`;ctx.lineWidth=3;ctx.strokeRect(ox-.5,oy-.5,os+1,os+1);ctx.strokeStyle=`rgba(255,120,80,${.3+.3*Math.sin(frame*.3+1)})`;ctx.lineWidth=5;ctx.strokeRect(ox-2.5,oy-2.5,os+5,os+5)}
      else if(isSp){ctx.strokeStyle=`rgba(200,180,150,${.3+.25*Math.sin(frame*.4)})`;ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.strokeRect(ox-.5,oy-.5,os+1,os+1);ctx.setLineDash([])}
      else if(isDs){ctx.strokeStyle=`rgba(200,100,80,${.2+.2*Math.sin(frame*.3)})`;ctx.lineWidth=2;ctx.setLineDash([3,5]);ctx.strokeRect(ox-.5,oy-.5,os+1,os+1);ctx.setLineDash([])}
    });
  });

  // Boss
  if(boss&&difficulty==='boss'){
    const bx=boss.x*CELL,by=boss.y*CELL,bw=boss.w*CELL,bh=boss.h*CELL;
    // 主体
    ctx.fillStyle='rgba(180,20,40,.7)';ctx.fillRect(bx+2,by+2,bw-4,bh-4);
    // 脉冲边框
    const glow=.5+.5*Math.sin(frame*.15);
    ctx.strokeStyle=`rgba(255,40,60,${glow})`;ctx.lineWidth=4;
    ctx.strokeRect(bx+2,by+2,bw-4,bh-4);
    ctx.strokeStyle=`rgba(255,100,40,${glow*.6})`;ctx.lineWidth=8;
    ctx.strokeRect(bx-2,by-2,bw,bh);
    // 骷髅标记
    ctx.fillStyle='#fff';ctx.font=`bold ${CELL}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('☠',bx+bw/2,by+bh/2);ctx.textAlign='start';
    // Boss 名称标签
    const phaseLabels=['','巡逻','追踪','狂暴','地狱'];
    const phaseColors=['','#ff8844','#ff4444','#ff00cc','#ff0000'];
    const p=getBossPhase();
    ctx.fillStyle=phaseColors[p];ctx.font='bold 11px sans-serif';
    ctx.fillText(`BOSS ${phaseLabels[p]}`,bx+4,by-6);
  }

  // 蛇
  const skin=SKINS.find(sk=>sk.id===saveData.equipped)||SKINS[0];
  snake.forEach(([x,y],i)=>drawSnakeSeg(x*CELL+1,y*CELL+1,CELL-2,i,skin));

  // AI 蛇
  if(aiSnake&&aiAlive&&!isReplaying){
    aiSnake.forEach(([x,y],i)=>{
      const px=x*CELL+1,py=y*CELL+1,s=CELL-2;
      const r=6;ctx.beginPath();ctx.moveTo(px+r,py);ctx.lineTo(px+s-r,py);ctx.quadraticCurveTo(px+s,py,px+s,py+r);ctx.lineTo(px+s,py+s-r);ctx.quadraticCurveTo(px+s,py+s,px+s-r,py+s);ctx.lineTo(px+r,py+s);ctx.quadraticCurveTo(px,py+s,px,py+s-r);ctx.lineTo(px,py+r);ctx.quadraticCurveTo(px,py,px+r,py);ctx.closePath();
      ctx.fillStyle=i===0?'#0ff':'#088';ctx.fill();
      if(i===0){const cx=px+s/2,cy=py+s/2;ctx.beginPath();ctx.arc(cx-3,cy-3,3,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill()}
    });
  }

  // Game over
  if(gameOver){
    const earned=Math.floor(score/10);
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#fff';ctx.font='bold 34px sans-serif';ctx.textAlign='center';
    ctx.fillText(t('death'),canvas.width/2,canvas.height/2-54);
    ctx.font='21px sans-serif';ctx.fillStyle='#ddd';ctx.fillText(`${t('scoreLabel')}: ${score}`,canvas.width/2,canvas.height/2-14);
    if(earned>0){ctx.font='16px sans-serif';ctx.fillStyle='#ffd740';ctx.fillText(`${t('coinEarned')} +${earned}`,canvas.width/2,canvas.height/2+16)}
    const btnW=160,btnH=44,btnX=canvas.width/2-btnW/2,btnY=canvas.height/2+34;
    window._restartBtn={x:btnX,y:btnY,w:btnW,h:btnH};
    ctx.fillStyle='#64dc64';ctx.beginPath();const br=22;
    ctx.moveTo(btnX+br,btnY);ctx.lineTo(btnX+btnW-br,btnY);ctx.quadraticCurveTo(btnX+btnW,btnY,btnX+btnW,btnY+br);ctx.lineTo(btnX+btnW,btnY+btnH-br);ctx.quadraticCurveTo(btnX+btnW,btnY+btnH,btnX+btnW-br,btnY+btnH);ctx.lineTo(btnX+br,btnY+btnH);ctx.quadraticCurveTo(btnX,btnY+btnH,btnX,btnY+btnH-br);ctx.lineTo(btnX,btnY+br);ctx.quadraticCurveTo(btnX,btnY,btnX+br,btnY);ctx.closePath();ctx.fill();
    ctx.fillStyle='#111';ctx.font='bold 18px sans-serif';ctx.fillText(t('restartBtn'),canvas.width/2,btnY+btnH/2+6);ctx.textAlign='start';
  }
  if(paused&&!gameOver){
    ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#fff';ctx.font='bold 36px sans-serif';ctx.textAlign='center';ctx.fillText(t('pause'),canvas.width/2,canvas.height/2);ctx.textAlign='start';
  }
  frame++;
}

async function startHomeBGM(){if(homeBGM)return;try{const ctx=ensureAudio();if(ctx.state==='suspended')await ctx.resume();const mg=ctx.createGain();mg.gain.value=bgmMuted?0:.07;mg.connect(ctx.destination);const penta=[523,587,659,784,880];const mel=[2,3,4,3,2,1,2,0,3,4,3,2,1,0,1,2,4,3,2,1,2,3,4,2,1,0,2,1,0,2,3,4];const nl=.55,ll=mel.length*nl;let st=ctx.currentTime+.3;
function loop(){if(!homeBGM||homeBGM.stopped)return;const t=st;mel.forEach((idx,i)=>{const f=penta[idx];const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;const nt=t+i*nl;g.gain.setValueAtTime(0,nt);g.gain.linearRampToValueAtTime(.55,nt+.06);g.gain.linearRampToValueAtTime(.35,nt+nl*.65);g.gain.exponentialRampToValueAtTime(.001,nt+nl);o.connect(g);g.connect(mg);o.start(nt);o.stop(nt+nl)});[262,330,392].forEach(f=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.15,t+.1);g.gain.linearRampToValueAtTime(.12,t+ll*.7);g.gain.exponentialRampToValueAtTime(.001,t+ll);o.connect(g);g.connect(mg);o.start(t);o.stop(t+ll)});st+=ll;homeBGM.timer=setTimeout(loop,ll*1000-100)}homeBGM={masterGain:mg,stopped:false,timer:null};loop()}catch(e){}}

async function startGameBGM(){if(gameBGM)return;try{const ctx=ensureAudio();if(ctx.state==='suspended')await ctx.resume();stopGameBGM();const mg=ctx.createGain();mg.gain.value=bgmMuted?0:.12;mg.connect(ctx.destination);const bpm=130,beat=60/bpm;const kick=(t)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(40,t+.12);g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.connect(g);g.connect(mg);o.start(t);o.stop(t+.2)};const snare=(t)=>{const bs=Math.floor(ctx.sampleRate*.1);const b=ctx.createBuffer(1,bs,ctx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*(1-i/bs);const s=ctx.createBufferSource();s.buffer=b;const g=ctx.createGain();g.gain.setValueAtTime(.7,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);const f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=800;s.connect(f);f.connect(g);g.connect(mg);s.start(t);s.stop(t+.1)};const hh=(t)=>{const bs=Math.floor(ctx.sampleRate*.04);const b=ctx.createBuffer(1,bs,ctx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*(1-i/bs);const s=ctx.createBufferSource();s.buffer=b;const g=ctx.createGain();g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.03);const f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=5000;s.connect(f);f.connect(g);g.connect(mg);s.start(t);s.stop(t+.04)};const bass=(t,len)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.value=65;g.gain.setValueAtTime(.15,t);g.gain.linearRampToValueAtTime(.1,t+len*.8);g.gain.exponentialRampToValueAtTime(.001,t+len);const f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=200;o.connect(f);f.connect(g);g.connect(mg);o.start(t);o.stop(t+len)};const ll=beat*8;const pat=[[0,'kick'],[0,'hh'],[1,'hh'],[2,'snare'],[2,'hh'],[3,'hh'],[4,'kick'],[4,'hh'],[5,'hh'],[5,'kick'],[6,'snare'],[6,'hh'],[7,'hh']];let st=ctx.currentTime+.1;
function loop(){if(!gameBGM||gameBGM.stopped)return;const t=st;pat.forEach(([pt,type])=>{const nt=t+pt*beat;if(type==='kick')kick(nt);else if(type==='snare')snare(nt);else if(type==='hh')hh(nt+Math.random()*.008)});bass(t,ll);st+=ll;gameBGM.timer=setTimeout(loop,ll*1000-50)}gameBGM={masterGain:mg,stopped:false,timer:null};loop()}catch(e){}}

function drawCloud(c,cx,cy,sc){c.fillStyle='rgba(255,255,255,.85)';c.beginPath();const r=22*sc;c.arc(cx,cy,r,0,Math.PI*2);c.arc(cx+r*.7,cy-r*.3,r*.8,0,Math.PI*2);c.arc(cx+r*1.3,cy,r*.85,0,Math.PI*2);c.arc(cx-r*.4,cy+r*.1,r*.65,0,Math.PI*2);c.arc(cx+r*.5,cy+r*.2,r*.7,0,Math.PI*2);c.fill()}
function drawFlower(c,x,y,sz,color,sway){const sx=x+Math.sin(sway)*2,sy=y+Math.cos(sway)*1.5;c.strokeStyle='#7cb342';c.lineWidth=1.2;c.beginPath();c.moveTo(sx,sy);c.lineTo(sx,sy+sz*1.6);c.stroke();for(let a=0;a<5;a++){const ang=a*Math.PI*2/5;c.fillStyle=color;c.beginPath();c.arc(sx+Math.cos(ang)*sz,sy+Math.sin(ang)*sz,sz*.6,0,Math.PI*2);c.fill()}c.fillStyle='#fff9c4';c.beginPath();c.arc(sx,sy,sz*.45,0,Math.PI*2);c.fill()}
function animateHomeBg(){homeBgFrame++;const W=homeBgCanvas.width,H=homeBgCanvas.height,cx=W*.85,cy=H*.12;const sky=homeBgCtx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#7ec8f8');sky.addColorStop(.5,'#b8dff8');sky.addColorStop(.65,'#c8e8d0');sky.addColorStop(1,'#8bc78b');homeBgCtx.fillStyle=sky;homeBgCtx.fillRect(0,0,W,H);homeBgCtx.save();homeBgCtx.translate(cx,cy);homeBgCtx.rotate(homeBgFrame*.005);for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;homeBgCtx.strokeStyle='rgba(255,240,180,.5)';homeBgCtx.lineWidth=5;homeBgCtx.beginPath();homeBgCtx.moveTo(Math.cos(a)*28,Math.sin(a)*28);homeBgCtx.lineTo(Math.cos(a)*38,Math.sin(a)*38);homeBgCtx.stroke()}homeBgCtx.restore();homeBgCtx.fillStyle='#fff176';homeBgCtx.beginPath();homeBgCtx.arc(cx,cy,32,0,Math.PI*2);homeBgCtx.fill();homeBgCtx.fillStyle='#fff9c4';homeBgCtx.beginPath();homeBgCtx.arc(cx,cy,24,0,Math.PI*2);homeBgCtx.fill();clouds.forEach(c=>{c.x+=c.sp;if(c.x>W+100)c.x=-100;drawCloud(homeBgCtx,c.x,c.y,c.s)});homeBgCtx.fillStyle='#a8d8a0';homeBgCtx.beginPath();homeBgCtx.moveTo(0,H);homeBgCtx.quadraticCurveTo(W*.15,H*.62,W*.28,H*.6);homeBgCtx.quadraticCurveTo(W*.4,H*.57,W*.55,H*.63);homeBgCtx.quadraticCurveTo(W*.68,H*.59,W*.8,H*.61);homeBgCtx.quadraticCurveTo(W*.9,H*.58,W,H*.62);homeBgCtx.lineTo(W,H);homeBgCtx.closePath();homeBgCtx.fill();homeBgCtx.fillStyle='#7ecb76';homeBgCtx.beginPath();homeBgCtx.moveTo(0,H*.65);homeBgCtx.bezierCurveTo(W*.25,H*.63,W*.5,H*.68,W*.75,H*.64);homeBgCtx.lineTo(W,H*.66);homeBgCtx.lineTo(W,H);homeBgCtx.lineTo(0,H);homeBgCtx.closePath();homeBgCtx.fill();const gy=H*.67,ss=Math.min(W/560,1.6);bgSnakes.forEach(s=>{s.stepCount++;if(Math.random()<.01)s.dir=s.dir[0]===1?[-1,0]:[1,0];if(s.stepCount<s.stepEvery){}else s.stepCount=0;const head=s.segments[0];let nx=s.stepCount===0?head[0]+s.dir[0]:head[0];const mc=Math.floor(W/(22*ss));if(nx<0){nx=mc-1;s.dir=[-1,0]}if(nx>mc-1){nx=0;s.dir=[1,0]}if(s.stepCount===0){s.segments.unshift([nx,head[1]]);if(s.segments.length>s.maxLen)s.segments.pop()}s.segments.forEach(([sx,sy],i)=>{const cell=22*ss,px=sx*cell,py=gy+sy*cell*.4,r=cell*.4;homeBgCtx.beginPath();homeBgCtx.arc(px+r,py+r,r,0,Math.PI*2);homeBgCtx.fillStyle=i===0?s.color.head:s.color.body;homeBgCtx.fill();if(i===0){homeBgCtx.fillStyle='#fff';homeBgCtx.beginPath();homeBgCtx.arc(px+r+r*.3,py+r*.6,r*.35,0,Math.PI*2);homeBgCtx.fill();homeBgCtx.fillStyle='#222';homeBgCtx.beginPath();homeBgCtx.arc(px+r+r*.3,py+r*.6,r*.18,0,Math.PI*2);homeBgCtx.fill()}})});flowers.forEach(f=>drawFlower(homeBgCtx,f.x,f.y,f.size,f.color,f.sway+homeBgFrame*.02));bgAnimId=requestAnimationFrame(animateHomeBg)}
function startHomeBg(){initHomeBg();animateHomeBg()}
function stopHomeBg(){if(bgAnimId)cancelAnimationFrame(bgAnimId)}

// ==================== Input ====================
document.addEventListener('keydown',e=>{
  if(isReplaying)return;
  const k=e.key;
  if(k==='ArrowUp'||k==='w'||k==='W'){e.preventDefault();if(direction[1]!==1){nextDirection=[0,-1];sfxClick()}}
  else if(k==='ArrowDown'||k==='s'||k==='S'){e.preventDefault();if(direction[1]!==-1){nextDirection=[0,1];sfxClick()}}
  else if(k==='ArrowLeft'||k==='a'||k==='A'){e.preventDefault();if(direction[0]!==1){nextDirection=[-1,0];sfxClick()}}
  else if(k==='ArrowRight'||k==='d'||k==='D'){e.preventDefault();if(direction[0]!==-1){nextDirection=[1,0];sfxClick()}}
  else if(k===' '){e.preventDefault();if(!gameOver&&canBoost()){speedBoost=true;sfxClick()}}
  else if(k==='p'||k==='P'){e.preventDefault();togglePause()}
  else if(k==='r'||k==='R'){e.preventDefault();showConfirmRestart();sfxClick()}
});
document.addEventListener('keyup',e=>{if(e.key===' '){e.preventDefault();speedBoost=false}boostBadge.classList.toggle('active',speedBoost)});
const origUI=updateUI;updateUI=function(){origUI();boostBadge.classList.toggle('active',speedBoost)}

function togglePause(){if(gameOver||isReplaying)return;sfxClick();paused=!paused;if(paused)stopGameBGM();else startGameBGM()}

// Confirm restart
const confirmOverlay=document.getElementById('confirmOverlay');
let wasPausedByConfirm=false;
function showConfirmRestart(){if(gameOver){confirmRestart();return}if(!paused){paused=true;wasPausedByConfirm=true;stopGameBGM()}confirmOverlay.classList.remove('hidden')}
function hideConfirmRestart(){confirmOverlay.classList.add('hidden');if(wasPausedByConfirm){paused=false;wasPausedByConfirm=false;startGameBGM()}}
function confirmRestart(){hideConfirmRestart();clearTimeout(gameLoop);gameOver=true;difficulty='medium';obstacles=[];obstacleTimer=0;powerups=[];activePowerups={};stopGameBGM();startHomeBGM();updateDiffLocks();document.getElementById('lockTip').style.display='none';diffOverlay.classList.remove('hidden');document.getElementById('aiPanel').classList.add('hidden')}
document.getElementById('confirmCancel').addEventListener('click',()=>{sfxClick();hideConfirmRestart()});
document.getElementById('confirmOk').addEventListener('click',()=>{sfxClick();confirmRestart()});

// Game over DOM button
const gameOverBtn=document.createElement('button');gameOverBtn.id='gameOverBtn';gameOverBtn.textContent=t('restartBtn');
gameOverBtn.style.cssText='position:absolute;z-index:50;display:none;background:#64dc64;color:#111;border:none;border-radius:22px;font-size:18px;font-weight:bold;padding:11px 0;cursor:pointer;font-family:inherit;letter-spacing:1px';
gameOverBtn.addEventListener('click',()=>{sfxClick();showConfirmRestart()});
document.querySelector('.game-wrapper').appendChild(gameOverBtn);
function syncGameOverBtn(){if(!gameOver){gameOverBtn.style.display='none';return}const r=canvas.getBoundingClientRect(),wr=canvas.parentElement.getBoundingClientRect();const btnW=160,btnH=44;gameOverBtn.style.display='block';gameOverBtn.style.left=(r.left-wr.left+canvas.width/2-btnW/2)+'px';gameOverBtn.style.top=(r.top-wr.top+canvas.height/2+34)+'px';gameOverBtn.style.width=btnW+'px';gameOverBtn.style.height=btnH+'px'}
const origDraw=draw;draw=function(){origDraw();if(gameOver)syncGameOverBtn()}

// Touch/Dpad
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(gameOver||isReplaying)return;const t=e.touches[0];touchStartX=t.clientX;touchStartY=t.clientY},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(gameOver||isReplaying||touchStartX==null)return;const t=e.changedTouches[0];const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;if(Math.abs(dx)>Math.abs(dy)){if(dx>20&&direction[0]!==-1)nextDirection=[1,0];else if(dx<-20&&direction[0]!==1)nextDirection=[-1,0]}else{if(dy>20&&direction[1]!==-1)nextDirection=[0,1];else if(dy<-20&&direction[1]!==1)nextDirection=[0,-1]}touchStartX=null;touchStartY=null},{passive:false});
let longPressTimer=null;
function bindDpad(id,dir){const btn=document.getElementById(id);btn.addEventListener('pointerdown',e=>{e.preventDefault();if(isReplaying)return;let c=false;if(dir[0]===1&&direction[0]!==-1){nextDirection=[1,0];c=true}if(dir[0]===-1&&direction[0]!==1){nextDirection=[-1,0];c=true}if(dir[1]===1&&direction[1]!==-1){nextDirection=[0,1];c=true}if(dir[1]===-1&&direction[1]!==1){nextDirection=[0,-1];c=true}if(c)sfxClick();if(gameOver)return;clearTimeout(longPressTimer);longPressTimer=setTimeout(()=>{if(canBoost()){speedBoost=true;boostBadge.classList.add('active')}},150)});const st=()=>{clearTimeout(longPressTimer);speedBoost=false;boostBadge.classList.remove('active')};btn.addEventListener('pointerup',st);btn.addEventListener('pointerleave',st);btn.addEventListener('pointercancel',st)}
bindDpad('btnUp',[0,-1]);bindDpad('btnDown',[0,1]);bindDpad('btnLeft',[-1,0]);bindDpad('btnRight',[1,0]);

// Footer
document.getElementById('btnBoost').addEventListener('pointerdown',()=>{sfxClick();if(!gameOver&&canBoost())speedBoost=true});
document.getElementById('btnBoost').addEventListener('pointerup',()=>{speedBoost=false});
document.getElementById('btnBoost').addEventListener('pointerleave',()=>{speedBoost=false});
document.getElementById('btnPause').addEventListener('click',()=>{togglePause()});
document.getElementById('btnRestart').addEventListener('click',()=>{sfxClick();showConfirmRestart()});

// ==================== Diff locks ====================
function updateDiffLocks(){const ml=!isDiffUnlocked('medium'),hl=!isDiffUnlocked('hard'),bl=!isDiffUnlocked('boss');document.getElementById('lockMedium').style.display=ml?'block':'none';document.getElementById('lockHard').style.display=hl?'block':'none';document.getElementById('lockBoss').style.display=bl?'block':'none';document.getElementById('diffMedium').classList.toggle('locked',ml);document.getElementById('diffHard').classList.toggle('locked',hl);document.getElementById('diffBoss').classList.toggle('locked',bl)}
function showLockTip(mode){document.getElementById('lockTipMsg').textContent=getUnlockHint(mode);document.getElementById('lockTip').style.display='block'}
document.getElementById('lockTipClose').addEventListener('click',()=>{document.getElementById('lockTip').style.display='none'});

// Home → Diff
document.getElementById('homeEnterBtn').addEventListener('click',()=>{sfxClick();aiMode=false;isReplaying=false;document.getElementById('aiPanel').classList.add('hidden');homeOverlay.classList.add('hidden');stopHomeBg();updateDiffLocks();document.getElementById('lockTip').style.display='none';diffOverlay.classList.remove('hidden')});
document.getElementById('homeAiBtn').addEventListener('click',()=>{sfxClick();aiMode=true;isReplaying=false;homeOverlay.classList.add('hidden');stopHomeBg();stopHomeBGM();skinOverlay.classList.add('hidden');diffOverlay.classList.add('hidden');highScore=parseInt(localStorage.getItem('snake_high'))||0;difficulty='easy';updateCoinDisplay();reset();startGameBGM();tick()});
document.getElementById('diffBack').addEventListener('click',()=>{sfxClick();diffOverlay.classList.add('hidden');document.getElementById('lockTip').style.display='none';homeOverlay.classList.remove('hidden');startHomeBg()});
document.getElementById('devBtn').addEventListener('click',()=>{const pw=prompt(t('devPrompt'));if(pw==='1024'){devMode=true;updateDiffLocks();alert(t('devOn'))}else if(pw!==null)alert(t('devFail'))});

// Diff select
document.getElementById('diffEasy').addEventListener('click',()=>{sfxClick();selectDifficulty('easy')});
document.getElementById('diffMedium').addEventListener('click',()=>{sfxClick();if(!isDiffUnlocked('medium')){showLockTip('medium');return}selectDifficulty('medium')});
document.getElementById('diffHard').addEventListener('click',()=>{sfxClick();if(!isDiffUnlocked('hard')){showLockTip('hard');return}selectDifficulty('hard')});
document.getElementById('diffBoss').addEventListener('click',()=>{sfxClick();if(!isDiffUnlocked('boss')){showLockTip('boss');return}selectDifficulty('boss')});
function selectDifficulty(level){difficulty=level;diffOverlay.classList.add('hidden');document.getElementById('lockTip').style.display='none';skinOverlay.classList.remove('hidden');skinDismissed=false;skinTimer=5;document.getElementById('countdownNum').textContent=skinTimer;renderSplashSkinGrid();clearInterval(skinInterval);skinInterval=setInterval(()=>{skinTimer--;if(skinTimer<=0){clearInterval(skinInterval);document.getElementById('countdownNum').textContent='0';enterGame()}else{document.getElementById('countdownNum').textContent=skinTimer}},1000)}

// Skin → Game
const skinOverlay=document.getElementById('skinOverlay');let skinTimer=5,skinInterval,skinDismissed=false;
function enterGame(){if(skinDismissed)return;skinDismissed=true;clearInterval(skinInterval);skinOverlay.classList.add('hidden');highScore=parseInt(localStorage.getItem('snake_high'))||0;updateCoinDisplay();stopHomeBGM();startGameBGM();reset();tick()}
document.getElementById('skinClose').addEventListener('click',()=>{sfxClick();enterGame()});
document.getElementById('skinStart').addEventListener('click',()=>{sfxClick();enterGame()});

// ==================== Skin grid ====================
function renderSkinGrid(container,onSelect){container.innerHTML='';SKINS.forEach(skin=>{const owned=devMode||saveData.owned.includes(skin.id),equipped=saveData.equipped===skin.id;const div=document.createElement('div');div.className='skin-item'+(equipped?' selected':'')+(!owned?' locked':'');const pc=skin.premium?'conic-gradient(red,yellow,lime,cyan,blue,magenta,red)':skin.head;div.innerHTML=`<div class="swatch" style="background:${pc};background-size:cover;"></div><span>${skin.name}</span>${!owned?`<span class="price">${skin.price} coins</span>`:(equipped?'<span style="font-size:10px;color:#64dc64;font-weight:bold;">Equipped</span>':'<span style="font-size:11px;">Owned</span>')}`;div.addEventListener('click',()=>{sfxClick();onSelect(skin,owned,equipped)});container.appendChild(div)})}
function renderSplashSkinGrid(){const g=document.getElementById('splashSkinGrid');renderSkinGrid(g,(skin,owned,equipped)=>{if(!owned){if(saveData.coins>=skin.price){saveData.coins-=skin.price;saveData.owned.push(skin.id);saveData.equipped=skin.id;persistSave();updateCoinDisplay();renderSplashSkinGrid()}return}saveData.equipped=skin.id;persistSave();renderSplashSkinGrid()})}

// ==================== Shop ====================
const shopOverlay=document.getElementById('shopOverlay');
let shopDirty=false,wasPausedByShop=false;
function openShop(){if(!gameOver&&!paused&&!isReplaying){paused=true;wasPausedByShop=true;stopGameBGM()}shopOverlay.classList.remove('hidden');shopDirty=false;document.getElementById('shopCoins').textContent=saveData.coins;document.getElementById('shopMsg').textContent='';renderShopGrid()}
function closeShop(){shopOverlay.classList.add('hidden');if(wasPausedByShop){paused=false;wasPausedByShop=false;startGameBGM()}if(shopDirty){persistSave();updateCoinDisplay()}}
function renderShopGrid(){const g=document.getElementById('shopSkinGrid'),m=document.getElementById('shopMsg');renderSkinGrid(g,(skin,owned,equipped)=>{if(owned){saveData.equipped=skin.id;shopDirty=true;persistSave();renderShopGrid();renderSplashSkinGrid();m.textContent=`Equipped "${skin.name}"`;return}if(saveData.coins>=skin.price){saveData.coins-=skin.price;saveData.owned.push(skin.id);saveData.equipped=skin.id;shopDirty=true;persistSave();document.getElementById('shopCoins').textContent=saveData.coins;renderShopGrid();renderSplashSkinGrid();m.textContent=`Purchased "${skin.name}"!`}else{m.textContent=`Need ${skin.price-saveData.coins} more coins`}})}
document.getElementById('shopClose').addEventListener('click',()=>{sfxClick();closeShop()});
document.getElementById('shopCloseBtn').addEventListener('click',()=>{sfxClick();closeShop()});
document.getElementById('footerShopBtn').addEventListener('click',()=>{sfxClick();openShop()});

// ==================== Init ====================
function init(){initAudioAutoplay();updateAllTexts();updateCoinDisplay();snake=[[Math.floor(COLS/2),Math.floor(ROWS/2)]];direction=[1,0];nextDirection=[1,0];score=0;gameOver=false;paused=false;speedBoost=false;highScore=parseInt(localStorage.getItem('snake_high'))||0;spawnFood();updateUI();draw();startHomeBg();startHomeBGM();if(saveData.replay){replayData=saveData.replay;document.getElementById('homeReplayBtn').style.display='block'}window.addEventListener('resize',()=>{if(!homeOverlay.classList.contains('hidden'))initHomeBg()})}
init();
</script>

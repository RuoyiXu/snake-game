<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🐍 贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 20px 0 80px 0;
    padding-bottom: max(80px, env(safe-area-inset-bottom, 80px));
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow-y: auto; overflow-x: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none; user-select: none;
  }
  .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; min-height: 100vh; min-height: 100dvh; justify-content: center; }
  .header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 420px; color: #ccc; padding: 0 4px; }
  .scores { display: flex; flex-direction: column; gap: 2px; }
  .score { font-size: 20px; font-weight: bold; color: #eee; }
  .high { font-size: 12px; color: #999; }
  .coins { font-size: 12px; color: #ffd740; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .boost-badge { font-size: 15px; color: #ffd740; font-weight: bold; display: none; }
  .boost-badge.active { display: block; }
  .header-btn { background: rgba(255,255,255,0.1); border: none; color: #ccc; padding: 4px 12px; border-radius: 14px; font-size: 14px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .header-btn:active { background: rgba(255,255,255,0.22); }
  canvas { border: 2px solid #333; border-radius: 6px; display: block; background: #16162a; }

  /* 触屏虚拟方向键 */
  .dpad { display: none; width: 180px; height: 180px; position: relative; margin-top: 8px; margin-bottom: 24px; }
  .dpad button { position: absolute; width: 56px; height: 56px; border: none; border-radius: 28px; background: rgba(255,255,255,0.12); color: #ccc; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .dpad button:active { background: rgba(255,255,255,0.28); }
  .dpad .btn-up    { top: 0; left: 62px; }
  .dpad .btn-down  { bottom: 0; left: 62px; }
  .dpad .btn-left  { top: 62px; left: 0; }
  .dpad .btn-right { top: 62px; right: 0; }

  .footer { display: flex; gap: 12px; align-items: center; color: #666; font-size: 12px; }
  .footer button { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #ccc; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .footer button:active { background: rgba(255,255,255,0.18); }

  /* ====== 卡通治愈系首页 ====== */
  .home-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
    background: #87ceeb;
  }
  .home-overlay.hidden { display: none; }
  .home-bg-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .home-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; padding-bottom: max(60px, 14vh); gap: 6px; }
  .home-title {
    font-size: 76px; font-weight: 900; letter-spacing: 8px;
    /* 每个字独立样式通过 span 实现 */
    margin-bottom: 4px;
    animation: titleFloat 3s ease-in-out infinite;
  }
  .home-title span {
    display: inline-block;
    filter: drop-shadow(3px 4px 0px rgba(0,0,0,0.25));
  }
  .home-title .c1 { color: #ff5722; animation: charBounce 0.45s ease-in-out infinite; }
  .home-title .c2 { color: #f9a825; animation: charBounce 0.45s ease-in-out 0.1s infinite; }
  .home-title .c3 { color: #4caf50; animation: charBounce 0.45s ease-in-out 0.2s infinite; }
  @keyframes charBounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes titleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .home-subtitle { font-size: 15px; color: #5d7a5d; margin-bottom: 14px; text-align: center; line-height: 1.5; font-weight: 500; }
  .home-enter-btn {
    background: #ff6e6e; color: #fff; border: 3px solid #d94444; padding: 14px 50px; border-radius: 50px;
    font-size: 21px; font-weight: bold; cursor: pointer; font-family: inherit;
    box-shadow: 0 6px 0 #d94444, 0 8px 24px rgba(0,0,0,0.15);
    animation: btnBounce 2.5s ease-in-out infinite;
    letter-spacing: 2px;
    transition: all .1s;
  }
  .home-enter-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #d94444, 0 4px 12px rgba(0,0,0,0.15); }
  @keyframes btnBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  /* ====== 难度选择弹窗 ====== */
  .diff-overlay {
    position: fixed; inset: 0; z-index: 150;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
    background: linear-gradient(180deg, #7ec8f8 0%, #b8dff8 50%, #c8e8d0 65%, #8bc78b 100%);
  }
  .diff-overlay.hidden { display: none; }
  .diff-card {
    position: relative; z-index: 2;
    background: rgba(255,255,255,0.92);
    border-radius: 24px; padding: 28px 22px 24px; max-width: 380px; width: 90%; text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  }
  .diff-card h2 { font-size: 24px; color: #555; margin-bottom: 6px; }
  .diff-card .sub { font-size: 13px; color: #aaa; margin-bottom: 16px; }
  .diff-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .diff-btn {
    border: 2.5px solid #e0e0e0; border-radius: 16px; padding: 14px 16px;
    cursor: pointer; font-family: inherit; text-align: left;
    transition: all .15s;
    display: flex; align-items: center; gap: 12px;
  }
  .diff-btn:active { transform: scale(0.97); }
  .diff-btn.easy { border-color: #66bb6a; background: #e8f5e9; }
  .diff-btn.easy:active { border-color: #43a047; background: #c8e6c9; }
  .diff-btn.medium { border-color: #ffa726; background: #fff3e0; }
  .diff-btn.medium:active { border-color: #ef6c00; background: #ffe0b2; }
  .diff-btn.hard { border-color: #ef5350; background: #ffebee; }
  .diff-btn.hard:active { border-color: #d32f2f; background: #ffcdd2; }
  .diff-btn .icon { font-size: 36px; flex-shrink: 0; }
  .diff-btn .info h3 { font-size: 17px; color: #444; margin-bottom: 2px; }
  .diff-btn .info p { font-size: 12px; color: #888; }
  .diff-back { background: none; border: none; color: #999; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 4px; }
  .diff-back:active { color: #666; }

  /* ====== 确认弹窗 ====== */
  .confirm-overlay {
    position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .confirm-overlay.hidden { display: none; }
  .confirm-card {
    background: #fff; border-radius: 20px; padding: 28px 24px 22px;
    max-width: 340px; width: 90%; text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .confirm-card h3 { font-size: 18px; color: #555; margin-bottom: 8px; }
  .confirm-card p { font-size: 14px; color: #999; margin-bottom: 18px; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 12px; justify-content: center; }
  .confirm-btns button { padding: 10px 24px; border-radius: 22px; font-size: 15px; font-weight: bold; cursor: pointer; font-family: inherit; border: none; transition: transform .1s; }
  .confirm-btns button:active { transform: scale(0.94); }
  .confirm-btns .btn-confirm { background: #ff6e6e; color: #fff; }
  .confirm-btns .btn-cancel { background: #f0f0f0; color: #666; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .overlay.hidden { display: none; }
  .modal { background: #fff; border-radius: 20px; padding: 24px 20px 20px; max-width: 400px; width: 100%; color: #444; text-align: center; box-shadow: 0 12px 48px rgba(0,0,0,0.18); position: relative; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 22px; margin-bottom: 6px; color: #555; }
  .modal .rules { font-size: 13px; color: #999; margin-bottom: 10px; line-height: 1.7; }
  .modal .countdown { font-size: 12px; color: #bbb; margin-bottom: 12px; }
  .modal .countdown span { color: #ff7b7b; font-weight: bold; font-size: 16px; }
  .modal .close-btn { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #bbb; font-size: 22px; cursor: pointer; line-height: 1; }
  .modal .close-btn:active { color: #666; }
  .skin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
  .skin-item { aspect-ratio: 1; border-radius: 14px; cursor: pointer; border: 2.5px solid #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 11px; color: #777; background: #fafafa; transition: all .2s; position: relative; }
  .skin-item:active { transform: scale(0.95); background: #f0f0f0; }
  .skin-item.selected { border-color: #64dc64; background: #f0fdf0; }
  .skin-item.locked { opacity: 0.45; }
  .skin-item .swatch { width: 32px; height: 32px; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  .skin-item .price { font-size: 10px; color: #e8953a; }
  .skin-item .owned-mark { position: absolute; top: 4px; right: 6px; font-size: 11px; }
  .skin-item .equipped-mark { position: absolute; bottom: 2px; font-size: 10px; color: #64dc64; font-weight: bold; }
  .modal .start-btn { background: #ff7b7b; border: none; color: #fff; padding: 12px 44px; border-radius: 28px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px rgba(255,123,123,0.3); transition: transform .15s; }
  .modal .start-btn:active { transform: scale(0.94); }

  /* ====== 商店弹窗 ====== */
  .shop-modal .skin-grid { grid-template-columns: repeat(4, 1fr); }
  .shop-modal .shop-footer { margin-top: 10px; }
  .shop-modal .close-shop-btn { background: #f0f0f0; border: none; color: #666; padding: 8px 28px; border-radius: 18px; font-size: 14px; cursor: pointer; font-family: inherit; }
  .shop-modal .close-shop-btn:active { background: #e0e0e0; }

  @media (pointer: coarse) {
    .dpad { display: block; }
    .footer { display: none; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <div class="scores">
      <span class="score" id="score">分数: 0</span>
      <span class="high" id="high">最高分: 0</span>
      <span class="coins" id="coins">🪙 0</span>
    </div>
    <div class="header-right">
      <span class="boost-badge" id="boostBadge">⚡ 加速中</span>
      <button class="header-btn" id="headerShopBtn">🏪 商店</button>
    </div>
  </div>
  <canvas id="canvas"></canvas>

  <div class="dpad" id="dpad">
    <button class="btn-up" id="btnUp">▲</button>
    <button class="btn-down" id="btnDown">▼</button>
    <button class="btn-left" id="btnLeft">◀</button>
    <button class="btn-right" id="btnRight">▶</button>
  </div>

  <div class="footer">
    <span>↑↓←→ / WASD 移动</span>
    <button id="btnBoost">⚡ 加速</button>
    <button id="btnPause">⏯ 暂停</button>
    <button id="btnRestart">↻ 重来</button>
    <button id="footerShopBtn">🏪 商店</button>
  </div>
</div>

<!-- 卡通治愈系首页 -->
<div class="home-overlay" id="homeOverlay">
  <canvas class="home-bg-canvas" id="homeBgCanvas"></canvas>
  <div class="home-content">
    <div class="home-title">
      <span class="c1">贪</span><span class="c2">吃</span><span class="c3">蛇</span>
    </div>
    <div class="home-subtitle">☀️ 阳光明媚，春暖花开 ☀️<br>和小蛇一起快乐冒险吧～</div>
    <button class="home-enter-btn" id="homeEnterBtn">🎮 进入游戏</button>
  </div>
</div>

<!-- 难度选择弹窗 -->
<div class="diff-overlay hidden" id="diffOverlay">
  <div class="diff-card">
    <h2>⚡ 选择难度</h2>
    <p class="sub">选择适合你的挑战级别</p>
    <div class="diff-btns">
      <button class="diff-btn easy" id="diffEasy">
        <span class="icon">🐣</span>
        <span class="info"><h3>简单模式</h3><p>悠闲节奏，轻松玩耍</p></span>
      </button>
      <button class="diff-btn medium" id="diffMedium">
        <span class="icon">🐍</span>
        <span class="info"><h3>中等模式</h3><p>正常速度，经典体验</p></span>
      </button>
      <button class="diff-btn hard" id="diffHard">
        <span class="icon">💀</span>
        <span class="info"><h3>困难模式</h3><p>场地中出现障碍物，碰到即死</p></span>
      </button>
    </div>
    <button class="diff-back" id="diffBack">← 返回首页</button>
  </div>
</div>

<!-- 皮肤选择弹窗 -->
<div class="overlay hidden" id="skinOverlay">
  <div class="modal">
    <button class="close-btn" id="skinClose">✕</button>
    <h2>🎨 选择皮肤</h2>
    <p class="rules">选择你喜欢的颜色，也可以在商店购买更多</p>
    <p class="countdown"><span id="countdownNum">5</span> 秒后自动开始</p>
    <div class="skin-grid" id="splashSkinGrid"></div>
    <button class="start-btn" id="skinStart">开始游戏</button>
  </div>
</div>

<!-- 商店弹窗 -->
<div class="overlay hidden" id="shopOverlay">
  <div class="modal shop-modal">
    <button class="close-btn" id="shopClose">✕</button>
    <h2>🏪 皮肤商店</h2>
    <p style="font-size:13px;color:#ffd740;margin:6px 0;">🪙 <span id="shopCoins">0</span></p>
    <div class="skin-grid" id="shopSkinGrid"></div>
    <p id="shopMsg" style="font-size:12px;color:#888;min-height:18px;margin:4px 0;"></p>
    <button class="close-shop-btn" id="shopCloseBtn">关闭商店</button>
  </div>
</div>

<!-- 确认重来弹窗 -->
<div class="confirm-overlay hidden" id="confirmOverlay">
  <div class="confirm-card">
    <h3>⚠️ 重来</h3>
    <p>重来会退出本局游戏<br>清空当前进度</p>
    <div class="confirm-btns">
      <button class="btn-cancel" id="confirmCancel">返回游戏</button>
      <button class="btn-confirm" id="confirmOk">确认退出</button>
    </div>
  </div>
</div>

<script>
// ==================== 皮肤数据 ====================
const SKINS = [
  { id: 'green',    name: '经典绿', head: '#64dc64', body: '#3cb43c', price: 0 },
  { id: 'yellow',   name: '柠檬黄', head: '#f5d442', body: '#c4a820', price: 100 },
  { id: 'blue',     name: '海洋蓝', head: '#4287f5', body: '#2060d0', price: 100 },
  { id: 'purple',   name: '葡萄紫', head: '#c042f5', body: '#8020c0', price: 100 },
  { id: 'red',      name: '草莓红', head: '#f54242', body: '#d02020', price: 100 },
  { id: 'pink',     name: '蜜桃粉', head: '#f5a0c0', body: '#d06090', price: 100 },
  { id: 'orange',   name: '日落橙', head: '#f58a42', body: '#d06020', price: 100 },
  { id: 'white',    name: '珍珠白', head: '#e8e8e8', body: '#b0b0b0', price: 100 },
  { id: 'mint',     name: '薄荷青', head: '#42f5c8', body: '#20c090', price: 100 },
  { id: 'gray',     name: '烟灰',   head: '#888888', body: '#666666', price: 100 },
  { id: 'aurora',   name: '🌈极光', head: null, body: null, price: 500, premium: true },
];

// ==================== 存档管理 ====================
let saveData;
function loadSave() {
  try {
    saveData = JSON.parse(localStorage.getItem('snake_save') || 'null');
  } catch(e) {}
  if (!saveData || typeof saveData !== 'object') {
    saveData = { coins: 0, owned: ['green'], equipped: 'green' };
  }
  if (!saveData.owned || !saveData.owned.length) saveData.owned = ['green'];
  if (!saveData.equipped || !saveData.owned.includes(saveData.equipped)) saveData.equipped = saveData.owned[0];
}
function persistSave() { localStorage.setItem('snake_save', JSON.stringify(saveData)); }
function getEquippedSkin() { return SKINS.find(s => s.id === saveData.equipped) || SKINS[0]; }

loadSave();

// ==================== 画布初始化 ====================
const isMobile = window.matchMedia('(pointer: coarse)').matches;
const maxCanvasSize = isMobile ? Math.min(window.innerWidth - 20, 420) : 560;
const COLS = 20, ROWS = 20;
const CELL = Math.floor(maxCanvasSize / COLS);
const BOOST_MULTI = 2;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// ==================== UI 元素 ====================
const scoreEl = document.getElementById('score');
const highEl = document.getElementById('high');
const coinsEl = document.getElementById('coins');
const boostBadge = document.getElementById('boostBadge');

// ==================== 游戏状态 ====================
let snake, direction, nextDirection, food, score, highScore, gameOver, paused, speedBoost;
let gameLoop, touchStartX, touchStartY;
let difficulty = 'medium'; // 'easy' | 'medium' | 'hard'
let obstacles = [];        // 障碍物 [{x, y, timer}]
let obstacleTimer = 0;

function updateCoinDisplay() {
  coinsEl.textContent = `🪙 ${saveData.coins}`;
}

function reset() {
  const sx = Math.floor(COLS / 2);
  const sy = Math.floor(ROWS / 2);
  snake = [[sx, sy]];
  direction = [1, 0]; nextDirection = [1, 0];
  score = 0; gameOver = false; paused = false; speedBoost = false;
  obstacles = []; obstacleTimer = 0;
  spawnFood();
  updateUI();
  updateCoinDisplay();
  boostBadge.classList.remove('active');
  gameOverBtn.style.display = 'none';
}

function getFPS() {
  if (difficulty === 'easy') return 8;
  if (difficulty === 'hard') return 12;
  return 10; // medium
}

function spawnFood() {
  const occupied = new Set(snake.map(([x, y]) => `${x},${y}`));
  let pos;
  do { pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)]; }
  while (occupied.has(`${pos[0]},${pos[1]}`));
  food = pos;
}

function updateUI() {
  scoreEl.textContent = `分数: ${score}`;
  highEl.textContent = `最高分: ${highScore}`;
}

// ==================== 游戏更新 ====================
function update() {
  if (gameOver || paused) return;
  direction = [...nextDirection];
  const head = snake[0];
  let nx = head[0] + direction[0], ny = head[1] + direction[1];
  nx = (nx + COLS) % COLS; ny = (ny + ROWS) % ROWS;

  // 自身碰撞
  if (snake.some(([x, y]) => x === nx && y === ny)) { endGame(); return; }
  // 障碍物碰撞
  if (difficulty === 'hard' && obstacles.some(o => o.x === nx && o.y === ny)) { endGame(); return; }

  snake.unshift([nx, ny]);
  if (nx === food[0] && ny === food[1]) {
    score += 10;
    if (score > highScore) highScore = score;
    spawnFood();
  } else { snake.pop(); }
  updateUI();

  // 障碍物管理
  if (difficulty === 'hard') {
    obstacleTimer++;
    // 每 25 帧尝试生成障碍物，场上最多 3 个
    if (obstacleTimer % 25 === 0 && obstacles.length < 3 && snake.length > 2) {
      const crowd = new Set(snake.map(([x, y]) => `${x},${y}`));
      crowd.add(`${food[0]},${food[1]}`);
      // 在场地中央区域生成
      for (let t = 0; t < 30; t++) {
        const ox = Math.floor(Math.random() * 8) + 6; // 6-13 列
        const oy = Math.floor(Math.random() * 8) + 6; // 6-13 行
        if (!crowd.has(`${ox},${oy}`) && !obstacles.some(o => o.x === ox && o.y === oy)) {
          obstacles.push({ x: ox, y: oy, life: 50 + Math.floor(Math.random() * 30) }); // 持续 50-80 帧
          break;
        }
      }
    }
    // 障碍物倒计时
    obstacles = obstacles.filter(o => { o.life--; return o.life > 0; });
  }
}

function endGame() {
  gameOver = true;
  if (score > highScore) { highScore = score; localStorage.setItem('snake_high', highScore); }
  const earned = Math.floor(score / 10);
  if (earned > 0) {
    saveData.coins = (saveData.coins || 0) + earned;
    persistSave();
  }
  updateCoinDisplay();
  updateUI();
}

// ==================== 渲染 ====================
let frame = 0;

function drawSnakeSegment(px, py, s, i, skin) {
  const r = 6;
  ctx.beginPath();
  ctx.moveTo(px + r, py); ctx.lineTo(px + s - r, py);
  ctx.quadraticCurveTo(px + s, py, px + s, py + r);
  ctx.lineTo(px + s, py + s - r);
  ctx.quadraticCurveTo(px + s, py + s, px + s - r, py + s);
  ctx.lineTo(px + r, py + s);
  ctx.quadraticCurveTo(px, py + s, px, py + s - r);
  ctx.lineTo(px, py + r); ctx.quadraticCurveTo(px, py, px + r, py);
  ctx.closePath();

  if (skin.premium) {
    // 极光渐变：色相随蛇身位置和帧数流动
    const hue = (i * 22 + frame * 5) % 360;
    ctx.fillStyle = `hsl(${hue}, 80%, ${i === 0 ? 55 : 40}%)`;
  } else {
    ctx.fillStyle = i === 0 ? skin.head : skin.body;
  }
  ctx.fill();

  // 眼睛
  if (i === 0) {
    const cx = px + s / 2, cy = py + s / 2;
    let e1, e2;
    if (direction[0] === 1)       { e1 = [cx + 4, cy - 6]; e2 = [cx + 4, cy + 6]; }
    else if (direction[0] === -1) { e1 = [cx - 4, cy - 6]; e2 = [cx - 4, cy + 6]; }
    else if (direction[1] === -1) { e1 = [cx - 6, cy - 4]; e2 = [cx + 6, cy - 4]; }
    else                           { e1 = [cx - 6, cy + 4]; e2 = [cx + 6, cy + 4]; }
    for (const [ex, ey] of [e1, e2]) {
      ctx.beginPath(); ctx.arc(ex, ey, 4, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
      ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI * 2); ctx.fillStyle = '#000'; ctx.fill();
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // 网格
  ctx.strokeStyle = '#202040'; ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke(); }

  // 食物
  const pulse = 1 + 0.15 * Math.abs((frame % 40) - 20) / 20;
  const fx = food[0] * CELL + CELL / 2, fy = food[1] * CELL + CELL / 2;
  const fr = (CELL / 2 - 4) * pulse;
  ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2); ctx.fillStyle = '#ff5050'; ctx.fill();
  ctx.beginPath(); ctx.arc(fx - 3, fy - 3, fr / 3, 0, Math.PI * 2); ctx.fillStyle = '#ffb4b4'; ctx.fill();

  // 障碍物（困难模式）
  obstacles.forEach(o => {
    const ox = o.x * CELL + 2, oy = o.y * CELL + 2, os = CELL - 4;
    const alpha = o.life < 15 ? 0.3 + (o.life / 15) * 0.5 : 0.8; // 快消失时闪烁
    ctx.fillStyle = `rgba(100,80,60,${alpha})`;
    ctx.fillRect(ox, oy, os, os);
    // 尖刺装饰
    ctx.fillStyle = `rgba(160,60,40,${alpha})`;
    ctx.beginPath();
    ctx.moveTo(ox + os/2, oy); ctx.lineTo(ox + os, oy + os/2);
    ctx.lineTo(ox + os/2, oy + os); ctx.lineTo(ox, oy + os/2);
    ctx.closePath(); ctx.fill();
  });

  // 蛇（应用皮肤）
  const skin = SKINS.find(s => s.id === saveData.equipped) || SKINS[0];
  snake.forEach(([x, y], i) => {
    drawSnakeSegment(x * CELL + 1, y * CELL + 1, CELL - 2, i, skin);
  });

  // 游戏结束遮罩
  if (gameOver) {
    const earned = Math.floor(score / 10);
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 34px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 54);
    ctx.font = '21px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillStyle = '#ddd'; ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 - 14);
    if (earned > 0) {
      ctx.font = '16px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.fillStyle = '#ffd740'; ctx.fillText(`🪙 +${earned}`, canvas.width / 2, canvas.height / 2 + 16);
    }
    // 重新开始按钮
    const btnW = 160, btnH = 44;
    const btnX = canvas.width / 2 - btnW / 2, btnY = canvas.height / 2 + 34;
    window._restartBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
    ctx.fillStyle = '#64dc64'; ctx.beginPath();
    const br = 22;
    ctx.moveTo(btnX + br, btnY); ctx.lineTo(btnX + btnW - br, btnY);
    ctx.quadraticCurveTo(btnX + btnW, btnY, btnX + btnW, btnY + br);
    ctx.lineTo(btnX + btnW, btnY + btnH - br);
    ctx.quadraticCurveTo(btnX + btnW, btnY + btnH, btnX + btnW - br, btnY + btnH);
    ctx.lineTo(btnX + br, btnY + btnH);
    ctx.quadraticCurveTo(btnX, btnY + btnH, btnX, btnY + btnH - br);
    ctx.lineTo(btnX, btnY + br); ctx.quadraticCurveTo(btnX, btnY, btnX + br, btnY);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#111'; ctx.font = 'bold 18px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillText('退出重来', canvas.width / 2, btnY + btnH / 2 + 6);
    ctx.textAlign = 'start';
  }

  // 暂停
  if (paused && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 36px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('暂停', canvas.width / 2, canvas.height / 2); ctx.textAlign = 'start';
  }
  frame++;
}

// ==================== 主循环 ====================
function tick() {
  update();
  draw();
  const baseFPS = getFPS();
  const delay = 1000 / (speedBoost ? baseFPS * BOOST_MULTI : baseFPS);
  gameLoop = setTimeout(tick, delay);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W')    { e.preventDefault(); if (direction[1] !== 1)  nextDirection = [0, -1]; }
  else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault(); if (direction[1] !== -1) nextDirection = [0, 1]; }
  else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { e.preventDefault(); if (direction[0] !== 1)  nextDirection = [-1, 0]; }
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D'){ e.preventDefault(); if (direction[0] !== -1) nextDirection = [1, 0]; }
  else if (e.key === ' ') { e.preventDefault(); if (!gameOver) speedBoost = true; }
  else if (e.key === 'p' || e.key === 'P') { e.preventDefault(); if (!gameOver) paused = !paused; }
  else if (e.key === 'r' || e.key === 'R') { e.preventDefault(); showConfirmRestart(); }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault(); if (gameOver) return;
  const t = e.touches[0]; touchStartX = t.clientX; touchStartY = t.clientY;
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault(); if (gameOver || touchStartX == null) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20 && direction[0] !== -1) nextDirection = [1, 0];
    else if (dx < -20 && direction[0] !== 1) nextDirection = [-1, 0];
  } else {
    if (dy > 20 && direction[1] !== -1) nextDirection = [0, 1];
    else if (dy < -20 && direction[1] !== 1) nextDirection = [0, -1];
  }
  touchStartX = null; touchStartY = null;
}, { passive: false });

let longPressTimer = null;
const LONG_PRESS_DELAY = 150;
function bindDpad(id, dir) {
  const btn = document.getElementById(id);
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (dir[0] === 1 && direction[0] !== -1)  nextDirection = [1, 0];
    if (dir[0] === -1 && direction[0] !== 1)  nextDirection = [-1, 0];
    if (dir[1] === 1 && direction[1] !== -1)  nextDirection = [0, 1];
    if (dir[1] === -1 && direction[1] !== 1)  nextDirection = [0, -1];
    if (gameOver) return;
    clearTimeout(longPressTimer);
    longPressTimer = setTimeout(() => { speedBoost = true; boostBadge.classList.add('active'); }, LONG_PRESS_DELAY);
  });
  const st = () => { clearTimeout(longPressTimer); speedBoost = false; boostBadge.classList.remove('active'); };
  btn.addEventListener('pointerup', st); btn.addEventListener('pointerleave', st); btn.addEventListener('pointercancel', st);
}
bindDpad('btnUp', [0, -1]); bindDpad('btnDown', [0, 1]); bindDpad('btnLeft', [-1, 0]); bindDpad('btnRight', [1, 0]);

// ==================== 首页背景动画（喜羊羊风格） ====================
const homeOverlay = document.getElementById('homeOverlay');
const homeBgCanvas = document.getElementById('homeBgCanvas');
const homeBgCtx = homeBgCanvas.getContext('2d');
let homeBgFrame = 0, bgAnimId;
let clouds = [], flowers = [], bgSnakes = [];

function initHomeBg() {
  homeBgCanvas.width = window.innerWidth;
  homeBgCanvas.height = window.innerHeight;
  const W = homeBgCanvas.width, H = homeBgCanvas.height;

  // 白云（画布坐标固定）
  clouds = [
    { x: W*0.08, y: H*0.08, s: 1.0, sp: 0.15 },
    { x: W*0.30, y: H*0.14, s: 0.7, sp: 0.22 },
    { x: W*0.58, y: H*0.06, s: 1.3, sp: 0.12 },
    { x: W*0.78, y: H*0.18, s: 0.8, sp: 0.18 },
  ];

  // 小花（在草地以上区域随机分布）
  flowers = [];
  for (let i = 0; i < 24; i++) {
    flowers.push({
      x: Math.random() * W,
      y: H * 0.62 + Math.random() * H * 0.35,
      size: 3 + Math.random() * 5,
      color: ['#ff6b8a','#ffcc4d','#ff9955','#ff88cc','#fff176'][Math.floor(Math.random()*5)],
      sway: Math.random() * Math.PI * 2,
    });
  }

  // 只有 3 条可爱小蛇在草地上穿行
  bgSnakes = [];
  const snakeColors = [
    { head: '#ff6b6b', body: '#ffb3b3' },
    { head: '#4fc3f7', body: '#b3e5fc' },
    { head: '#81c784', body: '#c8e6c9' },
  ];
  for (let i = 0; i < 3; i++) {
    const len = 5 + i * 2;
    const sx = Math.floor(Math.random() * 15);
    const sy = Math.floor(2 + Math.random() * 4);
    const segs = [];
    for (let j = 0; j < len; j++) segs.push([sx - j, sy]);
    bgSnakes.push({
      segments: segs,
      dir: [[1,0],[-1,0]][i % 2],
      color: snakeColors[i],
      maxLen: len,
      yRow: sy, // 保持在同一水平线
      stepCount: 0,
      stepEvery: 35 + i * 15, // 约每 35-65 帧移动一次，缓慢爬行
    });
  }
}

// 画白云
function drawCloud(ctx, cx, cy, scale) {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  const r = 22 * scale;
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.arc(cx + r*0.7, cy - r*0.3, r*0.8, 0, Math.PI*2);
  ctx.arc(cx + r*1.3, cy, r*0.85, 0, Math.PI*2);
  ctx.arc(cx - r*0.4, cy + r*0.1, r*0.65, 0, Math.PI*2);
  ctx.arc(cx + r*0.5, cy + r*0.2, r*0.7, 0, Math.PI*2);
  ctx.fill();
}

// 画花
function drawFlower(ctx, x, y, size, color, sway) {
  const sx = x + Math.sin(sway) * 2;
  const sy = y + Math.cos(sway) * 1.5;
  // 茎
  ctx.strokeStyle = '#7cb342';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(sx, sy); ctx.lineTo(sx, sy + size * 1.6);
  ctx.stroke();
  // 花瓣
  for (let a = 0; a < 5; a++) {
    const angle = a * Math.PI * 2 / 5;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(sx + Math.cos(angle)*size, sy + Math.sin(angle)*size, size*0.6, 0, Math.PI*2);
    ctx.fill();
  }
  // 花蕊
  ctx.fillStyle = '#fff9c4';
  ctx.beginPath(); ctx.arc(sx, sy, size*0.45, 0, Math.PI*2); ctx.fill();
}

function animateHomeBg() {
  homeBgFrame++;
  const W = homeBgCanvas.width, H = homeBgCanvas.height;
  const cx = W * 0.85, cy = H * 0.12; // 太阳位置

  // 蓝天渐变
  const sky = homeBgCtx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#7ec8f8');
  sky.addColorStop(0.5, '#b8dff8');
  sky.addColorStop(0.65, '#c8e8d0');
  sky.addColorStop(1, '#8bc78b');
  homeBgCtx.fillStyle = sky;
  homeBgCtx.fillRect(0, 0, W, H);

  // 太阳和光芒
  homeBgCtx.save();
  homeBgCtx.translate(cx, cy);
  homeBgCtx.rotate(homeBgFrame * 0.005);
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const inner = 28, outer = 38;
    homeBgCtx.strokeStyle = 'rgba(255,240,180,0.5)';
    homeBgCtx.lineWidth = 5;
    homeBgCtx.beginPath();
    homeBgCtx.moveTo(Math.cos(a)*inner, Math.sin(a)*inner);
    homeBgCtx.lineTo(Math.cos(a)*outer, Math.sin(a)*outer);
    homeBgCtx.stroke();
  }
  homeBgCtx.restore();
  // 太阳本体
  homeBgCtx.fillStyle = '#fff176';
  homeBgCtx.beginPath(); homeBgCtx.arc(cx, cy, 32, 0, Math.PI*2); homeBgCtx.fill();
  homeBgCtx.fillStyle = '#fff9c4';
  homeBgCtx.beginPath(); homeBgCtx.arc(cx, cy, 24, 0, Math.PI*2); homeBgCtx.fill();

  // 白云
  clouds.forEach(c => {
    c.x += c.sp;
    if (c.x > W + 100) c.x = -100;
    drawCloud(homeBgCtx, c.x, c.y, c.s);
  });

  // 远山（柔和曲线）
  homeBgCtx.fillStyle = '#a8d8a0';
  homeBgCtx.beginPath();
  homeBgCtx.moveTo(0, H);
  homeBgCtx.quadraticCurveTo(W*0.15, H*0.62, W*0.28, H*0.60);
  homeBgCtx.quadraticCurveTo(W*0.40, H*0.57, W*0.55, H*0.63);
  homeBgCtx.quadraticCurveTo(W*0.68, H*0.59, W*0.80, H*0.61);
  homeBgCtx.quadraticCurveTo(W*0.90, H*0.58, W, H*0.62);
  homeBgCtx.lineTo(W, H); homeBgCtx.closePath(); homeBgCtx.fill();

  // 近草地
  homeBgCtx.fillStyle = '#7ecb76';
  homeBgCtx.beginPath();
  homeBgCtx.moveTo(0, H*0.65);
  homeBgCtx.bezierCurveTo(W*0.25, H*0.63, W*0.50, H*0.68, W*0.75, H*0.64);
  homeBgCtx.lineTo(W, H*0.66); homeBgCtx.lineTo(W, H); homeBgCtx.lineTo(0, H);
  homeBgCtx.closePath(); homeBgCtx.fill();

  // 小蛇在草地上缓慢穿行
  const groundY = H * 0.67;
  const snakeScale = Math.min(W / 560, 1.6);
  bgSnakes.forEach(s => {
    s.stepCount++;
    // 偶尔随机转向
    if (Math.random() < 0.01) {
      s.dir = s.dir[0] === 1 ? [-1, 0] : [1, 0];
    }
    // 每隔 stepEvery 帧才移动一格
    if (s.stepCount < s.stepEvery) { /* 只渲染不移动 */ }
    else { s.stepCount = 0; }
    const head = s.segments[0];
    let nx = s.stepCount === 0 ? head[0] + s.dir[0] : head[0];
    const maxCols = Math.floor(W / (22 * snakeScale));
    if (nx < 0) { nx = maxCols - 1; s.dir = [-1, 0]; }
    if (nx > maxCols - 1) { nx = 0; s.dir = [1, 0]; }
    if (s.stepCount === 0) {
      s.segments.unshift([nx, head[1]]);
      if (s.segments.length > s.maxLen) s.segments.pop();
    }

    s.segments.forEach(([sx, sy], i) => {
      const cell = 22 * snakeScale;
      const px = sx * cell, py = groundY + sy * cell * 0.4;
      const r = cell * 0.4;
      homeBgCtx.beginPath();
      homeBgCtx.arc(px + r, py + r, r, 0, Math.PI * 2);
      homeBgCtx.fillStyle = i === 0 ? s.color.head : s.color.body;
      homeBgCtx.fill();
      if (i === 0) {
        homeBgCtx.fillStyle = '#fff';
        homeBgCtx.beginPath();
        homeBgCtx.arc(px + r + r*0.3, py + r*0.6, r*0.35, 0, Math.PI*2);
        homeBgCtx.fill();
        homeBgCtx.fillStyle = '#222';
        homeBgCtx.beginPath();
        homeBgCtx.arc(px + r + r*0.3, py + r*0.6, r*0.18, 0, Math.PI*2);
        homeBgCtx.fill();
      }
    });
  });

  // 花朵
  flowers.forEach(f => {
    drawFlower(homeBgCtx, f.x, f.y, f.size, f.color, f.sway + homeBgFrame * 0.02);
  });

  bgAnimId = requestAnimationFrame(animateHomeBg);
}

function startHomeBg() {
  initHomeBg();
  animateHomeBg();
}
function stopHomeBg() {
  if (bgAnimId) cancelAnimationFrame(bgAnimId);
}

  diffOverlay.classList.add('hidden');
  skinOverlay.classList.remove('hidden');
  skinDismissed = false;
  skinTimer = 5;
  document.getElementById('countdownNum').textContent = skinTimer;
  renderSplashSkinGrid();
  skinInterval = setInterval(() => {
    skinTimer--;
    if (skinTimer <= 0) { clearInterval(skinInterval); document.getElementById('countdownNum').textContent = '0'; enterGame(); }
    else { document.getElementById('countdownNum').textContent = skinTimer; }
  }, 1000);
}

document.getElementById('diffEasy').addEventListener('click', () => selectDifficulty('easy'));
document.getElementById('diffMedium').addEventListener('click', () => selectDifficulty('medium'));
document.getElementById('diffHard').addEventListener('click', () => selectDifficulty('hard'));

function enterGame() {
  if (skinDismissed) return;
  skinDismissed = true;
  clearInterval(skinInterval);
  skinOverlay.classList.add('hidden');
  highScore = parseInt(localStorage.getItem('snake_high')) || 0;
  updateCoinDisplay();
  reset();
  tick();
}

document.getElementById('skinClose').addEventListener('click', enterGame);
document.getElementById('skinStart').addEventListener('click', enterGame);

function renderSplashSkinGrid() {
  const grid = document.getElementById('splashSkinGrid');
  renderSkinGrid(grid, (skin, owned, equipped) => {
    if (!owned) {
      // 未拥有，尝试购买
      if (saveData.coins >= skin.price) {
        saveData.coins -= skin.price;
        saveData.owned.push(skin.id);
        saveData.equipped = skin.id;
        persistSave();
        updateCoinDisplay();
        renderSplashSkinGrid();
      }
      return;
    }
    // 已拥有，切换装备
    saveData.equipped = skin.id;
    persistSave();
    renderSplashSkinGrid();
  });
}

// ==================== 商店弹窗 ====================
const shopOverlay = document.getElementById('shopOverlay');
let shopDirty = false;

function openShop() {
  shopOverlay.classList.remove('hidden');
  shopDirty = false;
  document.getElementById('shopCoins').textContent = saveData.coins;
  document.getElementById('shopMsg').textContent = '';
  renderShopGrid();
}
function closeShop() {
  shopOverlay.classList.add('hidden');
  if (shopDirty) {
    // 如果商店里购买了新皮肤且当前装备的是默认，自动装备新买的
    persistSave();
    updateCoinDisplay();
  }
}

document.getElementById('shopClose').addEventListener('click', closeShop);
document.getElementById('shopCloseBtn').addEventListener('click', closeShop);
document.getElementById('headerShopBtn').addEventListener('click', openShop);
document.getElementById('footerShopBtn').addEventListener('click', openShop);

function renderShopGrid() {
  const grid = document.getElementById('shopSkinGrid');
  const msgEl = document.getElementById('shopMsg');
  renderSkinGrid(grid, (skin, owned, equipped) => {
    if (owned) {
      // 已拥有，装备
      saveData.equipped = skin.id;
      shopDirty = true;
      persistSave();
      renderShopGrid();
      renderSplashSkinGrid();
      msgEl.textContent = `已装备「${skin.name}」`;
      return;
    }
    // 未拥有，购买
    if (saveData.coins >= skin.price) {
      saveData.coins -= skin.price;
      saveData.owned.push(skin.id);
      saveData.equipped = skin.id;
      shopDirty = true;
      persistSave();
      document.getElementById('shopCoins').textContent = saveData.coins;
      renderShopGrid();
      renderSplashSkinGrid();
      msgEl.textContent = `购买成功！已装备「${skin.name}」`;
    } else {
      msgEl.textContent = `金币不足，还需要 ${skin.price - saveData.coins} 🪙`;
    }
  });
}

// ==================== 启动 ====================
function init() {
  updateCoinDisplay();
  // 渲染初始静态画面
  snake = [[Math.floor(COLS/2), Math.floor(ROWS/2)]];
  direction = [1, 0]; nextDirection = [1, 0];
  score = 0; gameOver = false; paused = false; speedBoost = false;
  highScore = parseInt(localStorage.getItem('snake_high')) || 0;
  spawnFood();
  updateUI();
  draw();
  // 启动首页背景动画
  startHomeBg();
  // 窗口缩放时重绘背景
  window.addEventListener('resize', () => {
    if (!homeOverlay.classList.contains('hidden')) initHomeBg();
  });
}

init();
</script>

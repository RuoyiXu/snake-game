<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 20px 0 80px 0;
    padding-bottom: max(80px, env(safe-area-inset-bottom, 80px));
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow-y: auto;
    overflow-x: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 400px;
    color: #ccc;
    padding: 0 4px;
  }
  .scores {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .score { font-size: 20px; font-weight: bold; color: #eee; }
  .high { font-size: 13px; color: #999; }
  .boost-badge {
    font-size: 15px;
    color: #ffd740;
    font-weight: bold;
    display: none;
  }
  .boost-badge.active { display: block; }
  canvas {
    border: 2px solid #333;
    border-radius: 6px;
    display: block;
    background: #16162a;
  }

  /* 触屏虚拟方向键 */
  .dpad {
    display: none;
    width: 180px;
    height: 180px;
    position: relative;
    margin-top: 8px;
    margin-bottom: 24px;
  }
  .dpad button {
    position: absolute;
    width: 56px;
    height: 56px;
    border: none;
    border-radius: 28px;
    background: rgba(255,255,255,0.12);
    color: #ccc;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad button:active { background: rgba(255,255,255,0.28); }
  .dpad .btn-up    { top: 0;   left: 62px; }
  .dpad .btn-down  { bottom: 0; left: 62px; }
  .dpad .btn-left  { top: 62px; left: 0; }
  .dpad .btn-right { top: 62px; right: 0; }

  .footer {
    display: flex;
    gap: 16px;
    align-items: center;
    color: #666;
    font-size: 12px;
  }
  .footer button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #ccc;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .footer button:active { background: rgba(255,255,255,0.18); }

  @media (pointer: coarse) {
    .dpad { display: block; }
    .footer { display: none; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <div class="scores">
      <span class="score" id="score">分数: 0</span>
      <span class="high" id="high">最高分: 0</span>
    </div>
    <span class="boost-badge" id="boostBadge">⚡ 加速中</span>
  </div>

  <canvas id="canvas"></canvas>

  <div class="dpad" id="dpad">
    <button class="btn-up" id="btnUp">▲</button>
    <button class="btn-down" id="btnDown">▼</button>
    <button class="btn-left" id="btnLeft">◀</button>
    <button class="btn-right" id="btnRight">▶</button>
  </div>

  <div class="footer">
    <span>↑↓←→ / WASD 移动</span>
    <button id="btnBoost">⚡ 加速</button>
    <button id="btnPause">⏯ 暂停</button>
    <button id="btnRestart">↻ 重来</button>
  </div>
</div>

<script>
// ==================== 常量 ====================
// 根据屏幕宽度自适应格子大小
const isMobile = window.matchMedia('(pointer: coarse)').matches;
const maxCanvasSize = isMobile ? Math.min(window.innerWidth - 20, 420) : 560;
const COLS = 20;
const ROWS = 20;
const CELL = Math.floor(maxCanvasSize / COLS);
const FPS = 10;
const BOOST_MULTI = 2;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// UI elements
const scoreEl = document.getElementById('score');
const highEl = document.getElementById('high');
const boostBadge = document.getElementById('boostBadge');

// ==================== 游戏状态 ====================
let snake, direction, nextDirection, food, score, highScore, gameOver, paused, speedBoost;
let gameLoop;

// 滑动检测
let touchStartX, touchStartY;

function reset() {
  const sx = Math.floor(COLS / 2);
  const sy = Math.floor(ROWS / 2);
  snake = [[sx, sy]];
  direction = [1, 0];
  nextDirection = [1, 0];
  score = 0;
  gameOver = false;
  paused = false;
  speedBoost = false;
  spawnFood();
  updateUI();
  boostBadge.classList.remove('active');
}

function spawnFood() {
  const occupied = new Set(snake.map(([x, y]) => `${x},${y}`));
  let pos;
  do {
    pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
  } while (occupied.has(`${pos[0]},${pos[1]}`));
  food = pos;
}

function updateUI() {
  scoreEl.textContent = `分数: ${score}`;
  highEl.textContent = `最高分: ${highScore}`;
}

// ==================== 游戏更新 ====================
function update() {
  if (gameOver || paused) return;

  direction = [...nextDirection];

  const head = snake[0];
  let nx = head[0] + direction[0];
  let ny = head[1] + direction[1];

  // 穿越边界
  nx = (nx + COLS) % COLS;
  ny = (ny + ROWS) % ROWS;

  // 自身碰撞
  if (snake.some(([x, y]) => x === nx && y === ny)) {
    gameOver = true;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snake_high', highScore);
    }
    updateUI();
    return;
  }

  snake.unshift([nx, ny]);

  if (nx === food[0] && ny === food[1]) {
    score += 10;
    // 如果超越历史最高分，实时更新
    if (score > highScore) {
      highScore = score;
    }
    spawnFood();
  } else {
    snake.pop();
  }
  updateUI();
}

// ==================== 渲染 ====================
let frame = 0;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 网格
  ctx.strokeStyle = '#202040';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(canvas.width, y * CELL);
    ctx.stroke();
  }

  // 食物（呼吸脉冲）
  const pulse = 1 + 0.15 * Math.abs((frame % 40) - 20) / 20;
  const fx = food[0] * CELL + CELL / 2;
  const fy = food[1] * CELL + CELL / 2;
  const fr = (CELL / 2 - 4) * pulse;
  ctx.beginPath();
  ctx.arc(fx, fy, fr, 0, Math.PI * 2);
  ctx.fillStyle = '#ff5050';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(fx - 3, fy - 3, fr / 3, 0, Math.PI * 2);
  ctx.fillStyle = '#ffb4b4';
  ctx.fill();

  // 蛇
  snake.forEach(([x, y], i) => {
    const px = x * CELL + 1;
    const py = y * CELL + 1;
    const s = CELL - 2;
    const r = 6;

    // 圆角矩形
    ctx.beginPath();
    ctx.moveTo(px + r, py);
    ctx.lineTo(px + s - r, py);
    ctx.quadraticCurveTo(px + s, py, px + s, py + r);
    ctx.lineTo(px + s, py + s - r);
    ctx.quadraticCurveTo(px + s, py + s, px + s - r, py + s);
    ctx.lineTo(px + r, py + s);
    ctx.quadraticCurveTo(px, py + s, px, py + s - r);
    ctx.lineTo(px, py + r);
    ctx.quadraticCurveTo(px, py, px + r, py);
    ctx.closePath();
    ctx.fillStyle = i === 0 ? '#64dc64' : '#3cb43c';
    ctx.fill();

    // 蛇头眼睛
    if (i === 0) {
      const cx = px + s / 2;
      const cy = py + s / 2;
      let e1, e2;
      if (direction[0] === 1)      { e1 = [cx + 4, cy - 6]; e2 = [cx + 4, cy + 6]; }
      else if (direction[0] === -1) { e1 = [cx - 4, cy - 6]; e2 = [cx - 4, cy + 6]; }
      else if (direction[1] === -1) { e1 = [cx - 6, cy - 4]; e2 = [cx + 6, cy - 4]; }
      else                          { e1 = [cx - 6, cy + 4]; e2 = [cx + 6, cy + 4]; }
      for (const [ex, ey] of [e1, e2]) {
        ctx.beginPath(); ctx.arc(ex, ey, 4, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
        ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI * 2); ctx.fillStyle = '#000'; ctx.fill();
      }
    }
  });

  // 游戏结束遮罩
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 46);
    ctx.font = '22px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillStyle = '#ddd';
    ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 4);

    // 重新开始按钮
    const btnW = 160, btnH = 44;
    const btnX = canvas.width / 2 - btnW / 2;
    const btnY = canvas.height / 2 + 24;
    window._restartBtn = { x: btnX, y: btnY, w: btnW, h: btnH };

    ctx.fillStyle = '#64dc64';
    ctx.beginPath();
    const br = 22;
    ctx.moveTo(btnX + br, btnY);
    ctx.lineTo(btnX + btnW - br, btnY);
    ctx.quadraticCurveTo(btnX + btnW, btnY, btnX + btnW, btnY + br);
    ctx.lineTo(btnX + btnW, btnY + btnH - br);
    ctx.quadraticCurveTo(btnX + btnW, btnY + btnH, btnX + btnW - br, btnY + btnH);
    ctx.lineTo(btnX + br, btnY + btnH);
    ctx.quadraticCurveTo(btnX, btnY + btnH, btnX, btnY + btnH - br);
    ctx.lineTo(btnX, btnY + br);
    ctx.quadraticCurveTo(btnX, btnY, btnX + br, btnY);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.font = 'bold 18px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillText('重新开始', canvas.width / 2, btnY + btnH / 2 + 6);
    ctx.textAlign = 'start';
  }

  // 暂停
  if (paused && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂停', canvas.width / 2, canvas.height / 2);
    ctx.textAlign = 'start';
  }

  frame++;
}

// ==================== 主循环 ====================
function tick() {
  update();
  draw();
  const delay = 1000 / (speedBoost ? FPS * BOOST_MULTI : FPS);
  gameLoop = setTimeout(tick, delay);
}

// ==================== 输入处理 ====================
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
    e.preventDefault();
    if (direction[1] !== 1) nextDirection = [0, -1];
  } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
    e.preventDefault();
    if (direction[1] !== -1) nextDirection = [0, 1];
  } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
    e.preventDefault();
    if (direction[0] !== 1) nextDirection = [-1, 0];
  } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
    e.preventDefault();
    if (direction[0] !== -1) nextDirection = [1, 0];
  } else if (e.key === ' ') {
    e.preventDefault();
    if (!gameOver) speedBoost = true;
  } else if (e.key === 'p' || e.key === 'P') {
    e.preventDefault();
    if (!gameOver) paused = !paused;
  } else if (e.key === 'r' || e.key === 'R') {
    e.preventDefault();
    if (gameOver) reset();
  }
});

document.addEventListener('keyup', e => {
  if (e.key === ' ') {
    e.preventDefault();
    speedBoost = false;
  }
  boostBadge.classList.toggle('active', speedBoost);
});

// 空格加速状态更新
const origTick = tick;
// 在 updateUI 后更新加速标记
const origUpdateUI = updateUI;
updateUI = function() {
  origUpdateUI();
  boostBadge.classList.toggle('active', speedBoost);
};

// ==================== 画布点击（重新开始按钮） ====================
canvas.addEventListener('click', e => {
  if (!gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * sx;
  const cy = (e.clientY - rect.top) * sy;
  const btn = window._restartBtn;
  if (btn && cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
    reset();
  }
});

canvas.addEventListener('touchend', e => {
  if (!gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const t = e.changedTouches[0];
  const cx = (t.clientX - rect.left) * sx;
  const cy = (t.clientY - rect.top) * sy;
  const btn = window._restartBtn;
  if (btn && cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
    reset();
  }
}, { passive: true });

// ==================== 触屏滑动 ====================
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameOver) return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (gameOver) return;
  if (touchStartX == null) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const threshold = 20;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > threshold && direction[0] !== -1) nextDirection = [1, 0];
    else if (dx < -threshold && direction[0] !== 1) nextDirection = [-1, 0];
  } else {
    if (dy > threshold && direction[1] !== -1) nextDirection = [0, 1];
    else if (dy < -threshold && direction[1] !== 1) nextDirection = [0, -1];
  }
  touchStartX = null;
  touchStartY = null;
}, { passive: false });

// 虚拟方向键
function bindDpad(id, dir) {
  const btn = document.getElementById(id);
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (dir[0] === 1  && direction[0] !== -1) nextDirection = [1, 0];
    if (dir[0] === -1 && direction[0] !== 1)  nextDirection = [-1, 0];
    if (dir[1] === 1  && direction[1] !== -1) nextDirection = [0, 1];
    if (dir[1] === -1 && direction[1] !== 1)  nextDirection = [0, -1];
  });
}
bindDpad('btnUp',    [0, -1]);
bindDpad('btnDown',  [0, 1]);
bindDpad('btnLeft',  [-1, 0]);
bindDpad('btnRight', [1, 0]);

// 底部按钮
document.getElementById('btnBoost').addEventListener('pointerdown', () => {
  if (!gameOver) speedBoost = true;
});
document.getElementById('btnBoost').addEventListener('pointerup', () => {
  speedBoost = false;
});
document.getElementById('btnBoost').addEventListener('pointerleave', () => {
  speedBoost = false;
});
document.getElementById('btnPause').addEventListener('click', () => {
  if (!gameOver) paused = !paused;
});
document.getElementById('btnRestart').addEventListener('click', () => {
  if (gameOver) reset();
});

// ==================== 启动 ====================
highScore = parseInt(localStorage.getItem('snake_high')) || 0;
reset();
updateUI();
tick();
</script>
</body>
</html>
